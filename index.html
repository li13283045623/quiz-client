<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题宝 Pro · 天津职业技术师范大学</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.prod.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #8E1045;
  --red-dk: #5C0B2E;
  --red-lt: #FCE4EC;
  --gold:   #D4AC0D;
  --gold-lt:#FEF9E7;
  --blue:   #2563EB;
  --blue-lt:#EFF6FF;
  --gray-50: #F8FAFC;
  --gray-100:#F1F5F9;
  --gray-200:#E2E8F0;
  --gray-400:#94A3B8;
  --gray-500:#64748B;
  --gray-700:#334155;
  --gray-800:#1E293B;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 16px rgba(142,16,69,0.06);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background-color: #F4F6F8;
  color: var(--gray-800);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

#app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: #FFF;
  box-shadow: 0 0 30px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow-x: hidden;
}

/* Auth Page */
.auth-container { padding: 40px 24px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.auth-logo { text-align: center; margin-bottom: 30px; }
.auth-logo .logo-icon { font-size: 56px; margin-bottom: 8px; display: inline-block; }
.auth-logo h1 { font-size: 24px; color: var(--red); font-weight: 800; }
.auth-logo p { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
.tab-bar { display: flex; background: var(--gray-100); padding: 4px; border-radius: var(--radius-sm); margin-bottom: 24px; }
.tab-btn { flex: 1; border: none; background: transparent; padding: 10px; font-size: 14px; font-weight: 600; color: var(--gray-500); cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.tab-btn.active { background: #FFF; color: var(--red); box-shadow: var(--shadow-sm); }
.form-group { margin-bottom: 16px; position: relative; }
.form-input, .form-textarea { width: 100%; padding: 13px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 14px; outline: none; transition: border 0.2s; background: var(--gray-50); }
.form-input:focus, .form-textarea:focus { border-color: var(--red); background: #FFF; }
.btn-primary { width: 100%; padding: 14px; background: var(--red); color: #FFF; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 12px rgba(142,16,69,0.2); }
.btn-primary:active { background: var(--red-dk); }
.btn-primary:disabled { background: var(--gray-400); box-shadow: none; cursor: not-allowed; }
.auth-error { color: #DC2626; font-size: 13px; margin-bottom: 12px; text-align: center; font-weight: 500; }
.v-code-row { display: flex; gap: 10px; }
.btn-code { padding: 0 16px; border: 1px solid var(--gray-200); background: #FFF; border-radius: var(--radius-sm); font-size: 13px; color: var(--gray-700); cursor: pointer; white-space: nowrap; font-weight: 500; }
.btn-code:disabled { color: var(--gray-400); background: var(--gray-50); cursor: not-allowed; }

/* Global Header */
.app-header { background: var(--red); color: #FFF; padding: 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.header-left { display: flex; align-items: center; gap: 10px; }
.school-badge { background: rgba(255,255,255,0.15); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; border: 0.5px solid rgba(255,255,255,0.2); cursor: pointer; }
.header-title { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
.btn-menu { background: transparent; border: none; color: #FFF; font-size: 22px; cursor: pointer; padding: 4px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
.btn-menu:active { background: rgba(255,255,255,0.1); }

/* Sidebar Drawer */
.sidebar-overlay { position: fixed; top: 0; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.4); z-index: 999; display: flex; justify-content: flex-end; }
.sidebar-content { width: 280px; height: 100%; background: #FFF; box-shadow: -4px 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 24px 16px; }
.sidebar-user { display: flex; align-items: center; gap: 12px; padding-bottom: 20px; border-bottom: 1px solid var(--gray-100); margin-bottom: 20px; position: relative; }
.sidebar-avatar { width: 48px; height: 48px; background: var(--red-lt); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--red); cursor: pointer; }
.sidebar-uinfo { flex: 1; overflow: hidden; }
.sidebar-uname { font-size: 15px; font-weight: 700; color: var(--gray-800); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
.sidebar-urole { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 2px; display: inline-block; background: var(--gold-lt); padding: 1px 5px; border-radius: 3px; }
.sidebar-menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--gray-700); cursor: pointer; transition: all 0.2s; margin-bottom: 6px; text-decoration: none; }
.sidebar-menu-item:active, .sidebar-menu-item.active { background: var(--red-lt); color: var(--red); }
.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--gray-100); }
.btn-logout { width: 100%; padding: 10px; background: var(--gray-100); color: #DC2626; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; }

/* Sub-page Profile View Components */
.profile-card { background: linear-gradient(135deg, var(--red), var(--red-dk)); color: #FFF; padding: 24px 20px; border-radius: var(--radius-md); margin-bottom: 20px; box-shadow: var(--shadow-md); position: relative; }
.profile-row { display: flex; align-items: center; gap: 16px; }
.profile-avatar-big { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 2px solid #FFF; }
.profile-meta h3 { font-size: 18px; font-weight: 800; }
.profile-meta p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.profile-gender-tag { font-size: 10px; background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
.btn-edit-profile { position: absolute; right: 16px; top: 16px; background: rgba(255,255,255,0.2); border: none; color: #FFF; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }
.profile-grid { display: grid; grid-template-columns: repeat(3, 100px); justify-content: space-between; margin-top: 20px; background: rgba(0,0,0,0.12); padding: 12px; border-radius: var(--radius-sm); }
.profile-gitem { text-align: center; }
.profile-gnum { font-size: 18px; font-weight: 800; color: var(--gold); }
.profile-glabel { font-size: 11px; opacity: 0.8; margin-top: 2px; }

/* Advanced Maintenance Section */
.maintenance-card { background: #FFF; border: 1px solid var(--gray-200); border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
.maintenance-title { font-size: 14px; font-weight: 800; color: var(--gray-700); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.maintenance-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--gray-100); }
.maintenance-row:last-child { border-bottom: none; }
.maintenance-info .m-name { font-size: 13px; font-weight: 700; color: var(--gray-800); }
.maintenance-info .m-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.btn-m-action { background: var(--gray-100); border: none; padding: 6px 12px; font-size: 12px; font-weight: 700; color: #DC2626; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.btn-m-action:active { background: #FEE2E2; }

/* Sub-page General Home Content layout */
.home-banner { background: var(--gold-lt); border: 1px solid rgba(212,172,13,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin: 16px 16px 0; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #B7950B; font-weight: 600; line-height: 1.4; }
.nav-tabs { display: flex; margin: 16px 16px 12px; border-bottom: 2px solid var(--gray-100); }
.nav-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 700; color: var(--gray-400); cursor: pointer; position: relative; border: none; background: transparent; }
.nav-tab.active { color: var(--red); }
.nav-tab.active::after { content: ''; position: absolute; bottom: -2px; left: 30%; right: 30%; height: 2px; background: var(--red); border-radius: 2px; }
.list-container { padding: 0 16px 30px; flex: 1; }

/* Bank Item Style */
.bank-card { background: #FFF; border: 1px solid var(--gray-100); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; }
.bank-card:active { transform: scale(0.98); box-shadow: none; }
.bank-icon { width: 44px; height: 44px; background: var(--blue-lt); color: var(--blue); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.bank-card:nth-child(even) .bank-icon { background: var(--red-lt); color: var(--red); }
.bank-info { flex: 1; margin-left: 14px; overflow: hidden; }
.bank-title { font-size: 14px; font-weight: 700; color: var(--gray-800); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
.bank-meta { font-size: 11px; color: var(--gray-400); margin-top: 4px; display: flex; gap: 12px; }
.bank-arrow { color: var(--gray-400); font-size: 16px; font-weight: bold; }

/* Empty Placeholder view state */
.empty { text-align: center; padding: 60px 20px; color: var(--gray-400); }
.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty div { font-size: 13px; font-weight: 500; }

/* Question View Box Components */
.back-btn { background: transparent; border: none; color: var(--gray-500); font-size: 14px; font-weight: 700; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.bank-info-card { background: var(--gray-50); border: 1px solid var(--gray-100); margin: 0 16px 16px; padding: 16px; border-radius: var(--radius-md); }
.bank-info-card h2 { font-size: 16px; font-weight: 800; color: var(--gray-800); }
.bank-info-card p { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
.limit-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 16px 16px; padding: 0 4px; }
.limit-label { font-size: 13px; font-weight: 700; color: var(--gray-500); }
.limit-btns { display: flex; gap: 6px; }
.limit-btn { border: 1px solid var(--gray-200); background: #FFF; padding: 4px 10px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; color: var(--gray-700); }
.limit-btn.active { background: var(--red); color: #FFF; border-color: var(--red); }
.mode-card { background: #FFF; border: 1px solid var(--gray-100); padding: 16px; margin: 0 16px 12px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow-sm); }
.mode-card:active { background: var(--gray-50); }
.mode-icon { font-size: 24px; }
.mode-name { font-size: 14px; font-weight: 700; color: var(--gray-800); }
.mode-desc { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* Practice layout components */
.progress-track { height: 3px; background: var(--gray-100); width: 100%; position: relative; }
.progress-fill { height: 100%; background: var(--red); width: 0; transition: width 0.2s ease; }
.practice-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #FFF; border-bottom: 0.5px solid var(--gray-100); }
.btn-exit { background: transparent; border: none; color: var(--gray-500); font-size: 13px; font-weight: 700; cursor: pointer; }
.score-chips { display: flex; gap: 8px; font-size: 12px; font-weight: 700; }
.chip-ok { background: #DCFCE7; color: #15803D; padding: 2px 8px; border-radius: 20px; }
.chip-err { background: #FEE2E2; color: #B91C1C; padding: 2px 8px; border-radius: 20px; }
.q-box { background: var(--gray-50); border: 1px solid var(--gray-100); padding: 16px; border-radius: var(--radius-md); margin-bottom: 16px; }
.q-box-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.q-type-badge { background: var(--blue-lt); color: var(--blue); font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
.btn-fav { background: transparent; border: none; font-size: 18px; cursor: pointer; color: var(--gold); }
.q-text { font-size: 15px; font-weight: 700; color: var(--gray-800); line-height: 1.5; }
.opt-btn { width: 100%; text-align: left; padding: 14px 16px; border: 1px solid var(--gray-200); background: #FFF; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--gray-700); cursor: pointer; margin-bottom: 10px; display: flex; align-items: flex-start; line-height: 1.4; transition: all 0.2s; }
.opt-key { margin-right: 8px; color: var(--gray-400); font-weight: 700; }
.opt-btn.selected-exam { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
.opt-btn.correct { border-color: #22C55E; background: #DCFCE7; color: #15803D; }
.opt-btn.wrong { border-color: #EF4444; background: #FEE2E2; color: #B91C1C; }
.opt-btn.dim { opacity: 0.5; }
.feedback-box { background: var(--gray-50); padding: 14px; border-radius: var(--radius-sm); margin-top: 16px; border-left: 4px solid var(--red); }
.feedback-correct { color: #15803D; font-weight: 700; font-size: 14px; }
.feedback-wrong { color: #B91C1C; font-weight: 700; font-size: 14px; }
.feedback-ans { font-size: 13px; color: var(--gray-700); margin-top: 6px; }
.practice-footer { display: flex; gap: 12px; padding: 12px 16px 24px; background: #FFF; border-top: 0.5px solid var(--gray-100); margin-top: auto; }
.btn-prev { flex: 1; padding: 12px; background: var(--gray-100); color: var(--gray-700); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-next { flex: 2; padding: 12px; background: var(--red); color: #FFF; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; }

/* Exam result board layout */
.result-hero { background: linear-gradient(to bottom, var(--gray-50), #FFF); text-align: center; padding: 32px 16px; border-bottom: 1px dashed var(--gray-200); }
.result-emoji { font-size: 54px; margin-bottom: 8px; }
.result-score { font-size: 48px; font-weight: 900; color: var(--red); line-height: 1; }
.result-sub { font-size: 13px; color: var(--gray-500); font-weight: 600; margin-top: 6px; }
.result-item { background: #FFF; border: 1px solid var(--gray-100); border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px; position: relative; }
.result-item.ok { border-left: 4px solid #22C55E; }
.result-item.bad { border-left: 4px solid #EF4444; }
.result-badge-ok { font-size: 10px; color: #15803D; background: #DCFCE7; padding: 2px 6px; border-radius: 4px; display: inline-block; font-weight: 700; margin-bottom: 8px; }
.result-badge-bad { font-size: 10px; color: #B91C1C; background: #FEE2E2; padding: 2px 6px; border-radius: 4px; display: inline-block; font-weight: 700; margin-bottom: 8px; }
.result-q { font-size: 14px; font-weight: 700; color: var(--gray-800); line-height: 1.4; }
.result-your { font-size: 12px; color: #EF4444; font-weight: 600; margin-top: 6px; }
.result-right { font-size: 12px; color: #15803D; font-weight: 600; margin-top: 4px; }

/* Upload Dashboard */
.upload-card { padding: 0 16px 30px; }
.upload-title { font-size: 16px; font-weight: 800; color: var(--gray-800); margin: 16px 0 12px; }
.upload-hint { font-size: 11px; color: var(--gray-400); margin: -6px 0 16px 2px; font-weight: 500; }
.upload-msg { font-size: 13px; font-weight: 600; padding: 10px; border-radius: var(--radius-sm); text-align: center; }
.upload-msg.ok { background: #DCFCE7; color: #15803D; }
.upload-msg.err { background: #FEE2E2; color: #B91C1C; }

/* Admin Panel view component */
.admin-bank-card, .admin-user-card { background: #FFF; border: 1px solid var(--gray-100); padding: 14px; border-radius: var(--radius-md); margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.admin-bank-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.btn-toggle-on { background: #DCFCE7; color: #15803D; border: none; padding: 4px 8px; font-size: 11px; font-weight: 700; border-radius: 4px; cursor: pointer; }
.btn-toggle-off { background: var(--gray-100); color: var(--gray-500); border: none; padding: 4px 8px; font-size: 11px; font-weight: 700; border-radius: 4px; cursor: pointer; }
.btn-del { background: transparent; border: none; color: #DC2626; font-size: 12px; font-weight: 700; cursor: pointer; }
.user-name { font-size: 14px; font-weight: 700; color: var(--gray-800); }
.user-date { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.admin-user-card { display: flex; justify-content: space-between; align-items: center; }
.btn-role { background: var(--blue-lt); color: var(--blue); border: none; padding: 4px 8px; font-size: 11px; font-weight: 700; border-radius: 4px; cursor: pointer; }
.btn-del-user { background: #FEE2E2; color: #B91C1C; border: none; padding: 4px 8px; font-size: 11px; font-weight: 700; border-radius: 4px; cursor: pointer; }

/* Modal Styles */
.modal-overlay { position: fixed; top: 0; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
.modal-body { background: #FFF; border-radius: var(--radius-md); width: 100%; max-width: 400px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); animation: modalFadeUp 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes modalFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.modal-title { font-size: 16px; font-weight: 800; color: var(--gray-800); margin-bottom: 16px; text-align: center; }
.avatar-selector { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; padding: 10px 0; }
.avatar-opt { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--gray-200); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.2s; }
.avatar-opt.active { border-color: var(--red); background: var(--red-lt); transform: scale(1.1); }
.modal-footer-btns { display: flex; gap: 10px; margin-top: 10px; }
.btn-cancel { flex: 1; padding: 12px; background: var(--gray-100); color: var(--gray-700); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div id="app">

  <template v-if="!token">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-icon">🎓</span>
        <h1>刷题宝 Pro</h1>
        <p>天津职业技术师范大学 · 专属云端刷题底座</p>
      </div>
      <div class="tab-bar">
        <button @click="authTab='login'" :class="['tab-btn', authTab==='login'?'active':'']">账号登录</button>
        <button @click="authTab='register'" :class="['tab-btn', authTab==='register'?'active':'']">新同学注册</button>
      </div>
      <div class="form-group">
        <input v-model="authForm.email" class="form-input" placeholder="天职师大邮箱/公共邮箱">
      </div>
      <div class="form-group">
        <input v-model="authForm.password" type="password" class="form-input" placeholder="设置登录密码">
      </div>
      <div v-if="authTab==='register'" class="form-group v-code-row">
        <input v-model="code" class="form-input" placeholder="输入邮箱验证码" style="flex:1;">
        <button @click="sendCode" :disabled="countdown>0" class="btn-code">
          {{ countdown > 0 ? countdown + 's 后重发' : '获取验证码' }}
        </button>
      </div>
      <div v-if="authError" class="auth-error">⚠️ {{ authError }}</div>
      <button @click="doAuth" class="btn-primary">
        {{ authTab==='login' ? '立即安全登录 ⚡' : '验证并加入刷题宝' }}
      </button>
    </div>
  </template>

  <template v-else>
    <header class="app-header">
      <div class="header-left">
        <span class="school-badge" @click="goTuteOfficial">TUTE 天职师大</span>
        <span class="header-title" @click="goHome" style="cursor:pointer;">刷题宝 Pro</span>
      </div>
      <button @click="isSidebarOpen=true" class="btn-menu">☰</button>
    </header>

    <div v-if="isSidebarOpen" class="sidebar-overlay" @click.self="isSidebarOpen=false">
      <div class="sidebar-content">
        <div class="sidebar-user">
          <div class="sidebar-avatar" @click="page='profile'; isSidebarOpen=false">{{ currentUser.avatar || '⚡' }}</div>
          <div class="sidebar-uinfo">
            <div class="sidebar-uname">{{ currentUser.nickname || maskEmail(currentUser.email) }}</div>

              <span v-if="user.role==='admin'" style="color:var(--gold);font-size:12px;">👑 管理员</span>

            <button @click="deleteUser(user._id)" class="btn-del-user">删除</button>
          </div>

<script>
const { createApp, ref, computed, onMounted } = Vue;
const API = 'https://quiz-server-ulpb.onrender.com/api';

createApp({
  setup() {
    // --- 基础权限与用户信息状态 ---
    const token = ref(localStorage.getItem('quiz_token') || '');
    const practiceLimit = ref(20);
    const currentUser = ref(JSON.parse(localStorage.getItem('quiz_user') || '{}'));
    const authTab = ref('login');
    const authForm = ref({ email: '', password: '' });
    const authError = ref('');
    const code = ref('');
    const countdown = ref(0);
    const isSidebarOpen = ref(false);

    // --- 个人资料编辑与高级管理状态 ---
    const isEditingProfile = ref(false);
    const editForm = ref({ nickname: '', gender: '保密', avatar: '⚡' });

    // --- 核心网络工具 ---
    const api = async (path, options = {}) => {
      const res = await fetch(API + path, {
        ...options,
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': 'Bearer ' + token.value, 
          ...(options.headers || {}) 
        }
      });
      return res.json();
    };

    // --- 认证鉴权交互逻辑 ---
    const sendCode = async () => {
      if (!authForm.value.email) { alert('请先填写邮箱'); return; }
      countdown.value = 60;
      const timer = setInterval(() => { countdown.value--; if (countdown.value <= 0) clearInterval(timer); }, 1000);
      const r = await fetch(API + '/send-code', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email: authForm.value.email }) });
      const data = await r.json();
      if (data.success) alert('验证码已发送！');
      else { alert(data.error); countdown.value = 0; }
    };

    const doAuth = async () => {
      authError.value = '';
      if (!authForm.value.email || !authForm.value.password) { authError.value = '请填写邮箱和密码'; return; }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(authForm.value.email)) { authError.value = '请输入有效的邮箱地址'; return; }
      const result = await api(`/${authTab.value}`, { method: 'POST', body: JSON.stringify({ ...authForm.value, code: code.value }) });
      if (result.success) {
        token.value = result.token;
        currentUser.value = result.user;
        localStorage.setItem('quiz_token', result.token);
        localStorage.setItem('quiz_user', JSON.stringify(result.user));
        fetchBanks(); loadMe();
      } else { authError.value = result.error; }
    };

    const logout = () => {
      token.value = ''; 
      currentUser.value = {};
      meData.value = {};
      wrongList.value = [];
      favoriteList.value = [];
      page.value = 'home';
      homeTab.value = 'banks';
      isEditingProfile.value = false;
      isSidebarOpen.value = false;
      
      document.body.style.overflow = ''; 
      localStorage.removeItem('quiz_token'); 
      localStorage.removeItem('quiz_user');
    };

    // --- 学校专属接口交互功能 ---
    const goTuteOfficial = () => {
      window.open('https://www.tute.edu.cn', '_blank');
    };

    const shareApp = () => {
      const shareUrl = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl)
          .then(() => alert('🚀 链接已复制到剪贴板，快分享给天职师大的同学们吧！'))
          .catch(() => alert('分享链接为：' + shareUrl));
      } else {
        alert('分享链接为：' + shareUrl);
      }
    };

    const showSuggest = () => {
      const s = prompt('💡 请输入你的建议（将通过邮件反馈给管理员）：');
      if (s && s.trim()) alert('感谢你的建议！我们会认真考虑 🙏');
    };

    // --- 页面与核心题库数据流状态 ---
    const page = ref('home');
    const homeTab = ref('banks');
    const banks = ref([]);
    const meData = ref({});
    const wrongList = ref([]);
    const favoriteList = ref([]);

    const accuracy = computed(() => {
      if (!meData.value.stats || meData.value.stats.totalAnswered === 0) return '0%';
      return Math.round(meData.value.stats.totalCorrect / meData.value.stats.totalAnswered * 100) + '%';
    });

    const fetchBanks = async () => { const r = await api('/get-banks-list'); if (r.success) banks.value = r.data; };
    const loadMe = async () => { const r = await api('/me'); if (r.success) meData.value = r.data; };
    const loadWrong = async () => { const r = await api('/wrong-questions'); if (r.success) wrongList.value = r.data; };
    const loadFavorites = async () => { const r = await api('/favorites'); if (r.success) favoriteList.value = r.data; };
    const goHome = () => { page.value = 'home'; homeTab.value = 'banks'; };

    onMounted(() => { if (token.value) { fetchBanks(); loadMe(); } });

    // --- 个人资料业务处理逻辑 ---
    const startEditProfile = () => {
      editForm.value.nickname = currentUser.value.nickname || '';
      editForm.value.gender = currentUser.value.gender || '保密';
      editForm.value.avatar = currentUser.value.avatar || '⚡';
      isEditingProfile.value = true;
    };

    const saveProfile = async () => {
      if (!editForm.value.nickname.trim()) { alert('昵称不能为空'); return; }
      const r = await api('/update-profile', { method: 'POST', body: JSON.stringify(editForm.value) });
      if (r.success) {
        currentUser.value = { ...currentUser.value, ...editForm.value };
        localStorage.setItem('quiz_user', JSON.stringify(currentUser.value));
        isEditingProfile.value = false;
        alert('✨ 资料更新成功！');
        loadMe();
      } else {
        alert(r.error || '资料保存失败');
      }
    };

    // --- 数据清空交互管理 ---
    const clearStats = async () => {
      if (!confirm('⚠️ 警告：确定要清除您所有的历史答题统计数据吗？此操作不可逆！')) return;
      const r = await api('/clear-stats', { method: 'POST' });
      if (r.success) { alert('统计数据已成功清零 🧹'); loadMe(); }
      else { alert(r.error || '清空失败'); }
    };

    const clearWrongQuestions = async () => {
      if (!confirm('确定要清空错题本中的所有题目吗？')) return;
      const r = await api('/clear-wrong', { method: 'POST' });
      if (r.success) { alert('错题本已全部清空 ✨'); loadWrong(); loadMe(); }
      else { alert(r.error || '清空失败'); }
    };

    const clearFavoritesAction = async () => {
      if (!confirm('确定要清空您的所有收藏夹吗？')) return;
      const r = await api('/clear-favorites', { method: 'POST' });
      if (r.success) { alert('收藏夹已清空 🗂️'); loadFavorites(); loadMe(); }
      else { alert(r.error || '清空失败'); }
    };

    // --- 隐私机制：安全脱敏邮箱处理工具 ---
    const maskEmail = (email) => {
      if (!email || typeof email !== 'string') return '';
      const parts = email.split('@');
      if (parts.length < 2) return email;
      const name = parts[0];
      const domain = parts[1];
      if (name.length <= 3) return name + '***@' + domain;
      return name.substring(0, 3) + '***@' + domain;
    };

    // --- 刷题及考试核心状态控制 ---
    const currentBank = ref({});
    const currentBankQuestions = ref([]);
    const openBank = async (bank) => {
      const r = await api('/get-bank/' + bank._id);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; page.value = 'selectMode'; }
    };

    const practiceMode = ref('sequential');
    const practiceQuestions = ref([]);
    const practiceStep = ref(0);
    const practiceAnswered = ref(false);
    const practiceSelectedOption = ref(null);
    const sessionCorrect = ref(0);
    const sessionWrong = ref(0);
    const sessionResults = ref([]);
    const examAnswers = ref([]);
    const examQuestions = ref([]);

    const currentPQ = computed(() => practiceQuestions.value[practiceStep.value] || {});
    const isFavorited = computed(() => {
      if (!meData.value.favorites) return false;
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return false;
      return meData.value.favorites.some(f => f.bankId === currentBank.value._id && f.questionIndex === q._origIndex);
    });

    const shuffle = (arr) => arr.map(v => ({v, s: Math.random()})).sort((a,b) => a.s-b.s).map(x => x.v);

    const startPractice = (mode) => {
      practiceMode.value = mode; practiceStep.value = 0; practiceAnswered.value = false;
      practiceSelectedOption.value = null; sessionCorrect.value = 0; sessionWrong.value = 0;
      sessionResults.value = []; examAnswers.value = [];
      let qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i}));
      if (mode === 'random') qs = shuffle(qs);
      else if (mode === 'exam') { qs = shuffle(qs).slice(0, Math.min(20, qs.length)); examAnswers.value = new Array(qs.length).fill(null); }
      else if (mode === 'slim') {
        const wrongIdxSet = new Set((meData.value.wrongQuestions||[]).filter(w => w.bankId===currentBank.value._id).map(w => w.questionIndex));
        qs = qs.filter(q => wrongIdxSet.has(q._origIndex));
        if (qs.length === 0) { alert('没有错题，改用顺序练习'); qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i})); }
      }
      if (mode !== 'exam' && practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
      practiceQuestions.value = qs; examQuestions.value = qs; page.value = 'practice';
    };

    const startWrongPractice = async () => {
      await loadWrong();
      if (wrongList.value.length === 0) return;
      const firstBankId = wrongList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; startPractice('slim'); }
    };

    const startFavPractice = async () => {
      if (favoriteList.value.length === 0) return;
      const firstBankId = favoriteList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) {
        currentBank.value = {...bank}; currentBankQuestions.value = r.data;
        practiceMode.value = 'random'; practiceStep.value = 0; practiceAnswered.value = false;
        practiceSelectedOption.value = null; sessionCorrect.value = 0; sessionWrong.value = 0; sessionResults.value = [];
        const favIdxSet = new Set(favoriteList.value.filter(f => f.bankId===firstBankId).map(f => f.questionIndex));
        let qs = r.data.map((q,i) => ({...q, _origIndex: i})).filter(q => favIdxSet.has(q._origIndex));
        if (practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
        practiceQuestions.value = qs; page.value = 'practice';
      }
    };

    const selectOption = (key) => {
      if (practiceAnswered.value || practiceMode.value === 'exam') return;
      practiceSelectedOption.value = key; practiceAnswered.value = true;
      const isCorrect = key === currentPQ.value.answer;
      if (isCorrect) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect });
    };

    const examSelectOption = (key) => { examAnswers.value[practiceStep.value] = key; };

    const getPracticeOptionClass = (key) => {
      if (!practiceAnswered.value) return '';
      if (key === currentPQ.value.answer) return 'correct';
      if (practiceSelectedOption.value === key) return 'wrong';
      return 'dim';
    };

    const nextQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) {
        practiceStep.value++; practiceAnswered.value = false; practiceSelectedOption.value = null;
      } else {
        if (sessionResults.value.length > 0) await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
        alert(`练习完成！共${practiceQuestions.value.length}题，答对${sessionCorrect.value}题`);
        goHome();
      }
    };

    const nextExamQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) { practiceStep.value++; }
      else {
        const results = examQuestions.value.map((q,i) => ({ questionIndex: q._origIndex, isCorrect: examAnswers.value[i] === q.answer }));
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results }) });
        await loadMe(); page.value = 'examResult';
      }
    };

    const prevQuestion = () => {
      if (practiceStep.value > 0) { practiceStep.value--; practiceAnswered.value = false; practiceSelectedOption.value = null; }
    };

    const exitPractice = async () => {
      if (sessionResults.value.length > 0 && practiceMode.value !== 'exam') {
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
      }
      goHome();
    };

    const examCorrectCount = computed(() => examQuestions.value.filter((q,i) => examAnswers.value[i] === q.answer).length);
    const examScore = computed(() => examQuestions.value.length === 0 ? 0 : Math.round(examCorrectCount.value / examQuestions.value.length * 100));
    const examScoreEmoji = computed(() => examScore.value >= 90 ? '🏆' : examScore.value >= 60 ? '😊' : '😢');

    const toggleFavorite = async () => {
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return;
      await api('/toggle-favorite', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, questionIndex: q._origIndex }) });
      await loadMe();
    };

    // --- 题库上传智能提取业务 ---
    const uploadForm = ref({ bankName: '', text: '' });
    const uploading = ref(false);
    const uploadMsg = ref('');

    const submitUpload = async () => {
      if (!uploadForm.value.bankName || !uploadForm.value.text) { uploadMsg.value = '❌ 请填写题库名称和题目内容'; return; }
      uploading.value = true; uploadMsg.value = '';
      const r = await api('/upload-bank', { method: 'POST', body: JSON.stringify(uploadForm.value) });
      uploading.value = false;
      if (r.success) { uploadMsg.value = '✅ ' + r.message; uploadForm.value = { bankName: '', text: '' }; fetchBanks(); }
      else uploadMsg.value = '❌ ' + r.error;
    };

    // --- 权限管理后台面板业务 ---
    const adminTab = ref('banks');
    const adminBanks = ref([]);
    const adminUsers = ref([]);
    const adminSelfId = computed(() => {
      if (!token.value) return '';
      try { return JSON.parse(atob(token.value.split('.')[1])).id; } catch { return ''; }
    });

    const loadAdminBanks = async () => { const r = await api('/admin/banks'); if (r.success) adminBanks.value = r.data; };
    const loadAdminUsers = async () => { const r = await api('/admin/users'); if (r.success) adminUsers.value = r.data; };

    const toggleBankStatus = async (bank) => {
      const r = await api(`/admin/banks/${bank._id}/toggle`, { method: 'PUT' });
      if (r.success || r.message) bank.isPublic = !bank.isPublic;
      else alert('操作失败: ' + (r.error || '未获授权'));
    };

    const deleteBank = async (id) => {
      if (!confirm('确认删除该题库？')) return;
      await api('/admin/banks/' + id, { method: 'DELETE' });
      loadAdminBanks(); fetchBanks();
    };

    const deleteUser = async (id) => {
      if (!confirm('确认删除该用户？')) return;
      await api('/admin/users/' + id, { method: 'DELETE' });
      loadAdminUsers();
    };

    const toggleRole = async (user) => {
      const newRole = user.role === 'admin' ? 'user' : 'admin';
      await api('/admin/users/' + user._id + '/role', { method: 'PUT', body: JSON.stringify({ role: newRole }) });
      loadAdminUsers();
    };

    return {
      token, currentUser, authTab, authForm, authError, code, countdown, sendCode, doAuth, logout, showSuggest,
      isEditingProfile, editForm, startEditProfile, saveProfile, isSidebarOpen,
      clearStats, clearWrongQuestions, clearFavoritesAction, goTuteOfficial, shareApp, maskEmail,
      page, homeTab, banks, meData, wrongList, favoriteList, accuracy, loadMe, loadWrong, loadFavorites, goHome, fetchBanks,
      currentBank, currentBankQuestions, openBank,
      practiceMode, practiceQuestions, practiceStep, practiceAnswered, practiceSelectedOption,
      sessionCorrect, sessionWrong, examAnswers, examQuestions, currentPQ, isFavorited,
      startPractice, startWrongPractice, startFavPractice,
      selectOption, examSelectOption, getPracticeOptionClass, nextQuestion, nextExamQuestion, prevQuestion, exitPractice,
      examCorrectCount, examScore, examScoreEmoji, toggleFavorite,
      uploadForm, uploading, uploadMsg, submitUpload,
      adminTab, adminBanks, adminUsers, adminSelfId, loadAdminBanks, loadAdminUsers,
      toggleBankStatus, deleteBank, deleteUser, toggleRole, practiceLimit,
    };
  }
}).mount('#app');
</script>
</body>
</html>
