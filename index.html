<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题宝 Pro · 天津职业技术师范大学</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.prod.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #8E1045;
  --red-dk: #5C0B2E;
  --red-lt: #FCE4EC;
  --gold:   #D4AC0D;
  --gold-lt:#FEF9E7;
  --blue:   #2563EB;
  --blue-lt:#EFF6FF;
  --gray-50: #F8FAFC;
  --gray-100:#F1F5F9;
  --gray-200:#E2E8F0;
  --gray-400:#94A3B8;
  --gray-500:#64748B;
  --gray-700:#334155;
  --gray-800:#1E293B;
  --green:  #16A34A;
  --green-lt:#F0FDF4;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

/* ===== LAYOUT ===== */
#app { max-width: 680px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ===== SCHOOL HEADER BANNER (大气加宽版) ===== */
.school-banner {
  background: linear-gradient(120deg, #6A0F35 0%, #8E1045 40%, #A01250 70%, #8E1045 100%);
  padding: 24px 24px; /* 增加上下内边距，使其更显宽大 */
  display: flex;
  align-items: center;
  gap: 18px;
  box-shadow: 0 4px 18px rgba(142,16,69,.45);
  position: relative;
  overflow: hidden;
}
.school-banner::before {
  content: '';
  position: absolute;
  right: -20px; top: -20px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,.08);
  border-radius: 50%;
}
.school-banner img {
  width: 64px; height: 64px; /* 放大校徽尺寸 */
  filter: brightness(0) invert(1);
  flex-shrink: 0;
}
.school-banner-text { color: white; }
.school-banner-text .cn {
  font-size: 22px; font-weight: 800; letter-spacing: 1.8px;
  text-shadow: 0 2px 4px rgba(0,0,0,.25);
}
.school-banner-text .en {
  font-size: 11px; opacity: .85; letter-spacing: .6px; margin-top: 5px; font-weight: 500;
}

/* ===== APP HEADER ===== */
.app-header {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.app-header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px; /* 适度拉宽 */
}
.app-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
.app-logo .icon { width: 38px; height: 38px; background: linear-gradient(135deg, #9C1250, #8E1045); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow: 0 2px 6px rgba(142,16,69,.2); }
.app-logo .name { font-size: 17px; font-weight: 800; color: var(--red); letter-spacing: 0.5px; }
.app-logo .sub  { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.header-email { font-size: 12px; color: var(--gray-500); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-admin { font-size: 11px; padding: 5px 12px; background: var(--gold-lt); color: #92630A; border-radius: 20px; border: 1px solid #F0D060; font-weight: 600; cursor: pointer; }
.btn-logout { font-size: 12px; color: var(--gray-400); background: none; border: none; cursor: pointer; padding: 4px 8px; font-weight: 500; }
.btn-logout:hover { color: var(--red); }

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  border-top: 1px solid var(--gray-100);
  background: white;
}
.tab-btn {
  flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; font-weight: 500;
  color: var(--gray-500); background: none; border: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .2s;
}
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

/* ===== LOGIN PAGE ===== */
.login-page {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.login-hero {
  background: linear-gradient(160deg, #5C0B2E 0%, #8E1045 55%, #9C1250 100%);
  padding: 50px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.login-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: rgba(255,255,255,.05);
  border-radius: 50%;
}
.login-hero img { width: 72px; height: 72px; margin-bottom: 16px; filter: brightness(0) invert(1); position: relative; z-index: 1; }
.login-hero h1 { color: white; font-size: 26px; font-weight: 800; position: relative; z-index: 1; letter-spacing: 1px; }
.login-hero p  { color: rgba(255,255,255,.8); font-size: 14px; margin-top: 6px; position: relative; z-index: 1; }

.login-card {
  background: white;
  margin: -20px 20px 0;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 24px;
  position: relative;
  z-index: 2;
}
.auth-tab-bar { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--gray-100); }
.auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; color: var(--gray-400); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.auth-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

.form-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200);
  border-radius: 10px; font-size: 14px; outline: none;
  transition: border-color .2s; font-family: inherit;
}
.form-input:focus { border-color: var(--red); }
.form-group { margin-bottom: 12px; }
.code-row { display: flex; gap: 8px; }
.btn-code {
  padding: 12px 14px; background: var(--red); color: white; border: none;
  border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-code:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

.btn-primary {
  width: 100%; padding: 13px; background: linear-gradient(135deg, #9C1250, #8E1045);
  color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 4px; transition: opacity .2s; box-shadow: 0 3px 12px rgba(142,16,69,.3);
}
.btn-primary:hover { opacity: .9; }

/* ===== COMMUNITY BANNER ===== */
.community-banner {
  margin: 16px 0;
  background: linear-gradient(135deg, #1E3A5F 0%, #2563EB 100%);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  color: white;
  box-shadow: 0 4px 14px rgba(37,99,235,.25);
}
.community-banner .icon-col { font-size: 32px; flex-shrink: 0; line-height: 1; }
.community-banner h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
.community-banner p  { font-size: 12px; opacity: .88; line-height: 1.6; }
.community-banner .tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.community-banner .tag {
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,.18); cursor: pointer; font-weight: 500;
  transition: background .2s;
}
.community-banner .tag:hover { background: rgba(255,255,255,.28); }

/* ===== MAIN ===== */
main { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }

/* ===== SECTION HEADER ===== */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; margin-top: 4px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--gray-700); }
.btn-upload {
  font-size: 12px; padding: 6px 14px; background: var(--red);
  color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600;
}

/* ===== CARD ===== */
.card {
  background: white; border-radius: var(--radius);
  border: 1.5px solid var(--gray-100); padding: 16px;
  margin-bottom: 10px; box-shadow: var(--shadow);
  cursor: pointer; transition: border-color .2s, transform .15s;
}
.card:hover { border-color: var(--red); transform: translateY(-1px); }
.card-row { display: flex; justify-content: space-between; align-items: flex-start; }
.card-name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
.card-meta { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
.card-arrow { color: var(--gray-200); font-size: 20px; line-height: 1; }

/* ===== EMPTY STATE ===== */
.empty { text-align: center; padding: 48px 0; color: var(--gray-400); font-size: 14px; }
.empty .emoji { font-size: 40px; margin-bottom: 12px; }

/* ===== STATS ===== */
.stats-hero {
  background: linear-gradient(135deg, #9C1250 0%, #8E1045 100%);
  border-radius: var(--radius); padding: 20px; color: white; margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(142,16,69,.25);
}
.stats-hero .greeting { font-size: 13px; opacity: .8; }
.stats-hero .big-num  { font-size: 40px; font-weight: 800; line-height: 1.1; margin: 4px 0; }
.stats-hero .label    { font-size: 12px; opacity: .8; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 16px; text-align: center; box-shadow: var(--shadow); }
.stat-card .num { font-size: 26px; font-weight: 800; }
.stat-card .lbl { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.num-green  { color: var(--green); }
.num-blue   { color: var(--blue); }
.num-red    { color: #EF4444; }
.num-gold   { color: var(--gold); }

/* ===== WRONG / FAV LIST ===== */
.q-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
.q-card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.q-title { font-size: 13px; color: var(--gray-700); flex: 1; line-height: 1.5; }
.q-wrong-badge { font-size: 11px; color: #EF4444; white-space: nowrap; font-weight: 600; }
.q-bank { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.q-answer { font-size: 11px; color: var(--green); margin-top: 4px; font-weight: 600; }

/* ===== SELECT MODE ===== */
.bank-info-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-200); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
.bank-info-card h2 { font-size: 16px; font-weight: 700; }
.bank-info-card p  { font-size: 12px; color: var(--gray-400); margin-top: 4px; }

.limit-bar { background: var(--gray-100); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
.limit-label { font-size: 11px; color: var(--gray-500); font-weight: 600; margin-bottom: 8px; }
.limit-btns { display: flex; gap: 6px; }
.limit-btn { flex: 1; padding: 7px 4px; border-radius: 8px; font-size: 12px; border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600); cursor: pointer; font-weight: 500; transition: all .15s; text-align: center; }
.limit-btn.active { background: var(--red); color: white; border-color: var(--red); font-weight: 700; }

.mode-card {
  background: white; border: 1.5px solid var(--gray-100); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px; transition: border-color .2s, transform .15s;
}
.mode-card:hover { border-color: var(--red); transform: translateY(-1px); }
.mode-icon { font-size: 24px; flex-shrink: 0; }
.mode-name { font-size: 14px; font-weight: 700; color: var(--gray-800); }
.mode-desc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* ===== PRACTICE ===== */
.progress-track { height: 3px; background: var(--gray-100); }
.progress-fill { height: 3px; background: linear-gradient(90deg, var(--red), #9C1250); transition: width .3s ease; }
.practice-topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; font-size: 13px; color: var(--gray-500); }
.btn-exit { color: var(--red); background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.score-chips { display: flex; gap: 8px; font-size: 12px; }
.chip-ok  { background: var(--green-lt); color: var(--green); padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.chip-err { background: #FEF2F2; color: #EF4444; padding: 3px 8px; border-radius: 20px; font-weight: 600; }

.q-box { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
.q-box-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-type-badge { font-size: 11px; padding: 3px 8px; background: var(--blue-lt); color: var(--blue); border-radius: 6px; font-weight: 600; }
.btn-fav { font-size: 20px; background: none; border: none; cursor: pointer; line-height: 1; }
.q-text { font-size: 15px; color: var(--gray-800); line-height: 1.7; }

.opt-btn {
  width: 100%; text-align: left; padding: 12px 16px; border-radius: 10px;
  border: 1.5px solid var(--gray-200); background: white; font-size: 14px;
  cursor: pointer; margin-bottom: 8px; transition: all .15s; font-family: inherit;
  display: flex; align-items: flex-start; gap: 8px;
}
.opt-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-lt); }
.opt-btn:disabled { cursor: not-allowed; }
.opt-btn.correct  { border-color: var(--green); background: var(--green-lt); color: var(--green); font-weight: 600; }
.opt-btn.wrong    { border-color: #EF4444; background: #FEF2F2; color: #EF4444; font-weight: 600; }
.opt-btn.dim      { border-color: var(--gray-100); background: var(--gray-50); opacity: .5; }
.opt-btn.selected-exam { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); font-weight: 600; }
.opt-key { font-weight: 700; flex-shrink: 0; }

.feedback-box { border-radius: 10px; border: 1.5px dashed var(--gray-200); padding: 14px; background: var(--gray-50); font-size: 13px; margin-top: 4px; }
.feedback-correct { color: var(--green); font-weight: 700; font-size: 14px; }
.feedback-wrong   { color: #EF4444; font-weight: 700; font-size: 14px; }
.feedback-ans { color: var(--gray-600); margin-top: 6px; }
.feedback-ans b { color: var(--green); }

.practice-footer { padding: 12px 16px; background: white; border-top: 1px solid var(--gray-100); display: flex; gap: 10px; }
.btn-prev { flex: 1; padding: 12px; border-radius: 10px; background: var(--gray-100); color: var(--gray-700); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-prev:disabled { opacity: .4; cursor: not-allowed; }
.btn-next { flex: 2; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #9C1250, #8E1045); color: white; border: none; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(142,16,69,.25); }

/* ===== EXAM RESULT ===== */
.result-hero { text-align: center; padding: 32px 16px 20px; }
.result-emoji { font-size: 56px; }
.result-score { font-size: 48px; font-weight: 800; color: var(--gray-800); line-height: 1; margin: 8px 0 4px; }
.result-sub   { font-size: 14px; color: var(--gray-400); }

.result-item { background: white; border-radius: 10px; border-width: 1.5px; border-style: solid; padding: 14px; margin-bottom: 8px; font-size: 13px; }
.result-item.ok  { border-color: #BBF7D0; }
.result-item.bad { border-color: #FECACA; }
.result-badge-ok  { color: var(--green); font-weight: 700; font-size: 11px; }
.result-badge-bad { color: #EF4444; font-weight: 700; font-size: 11px; }
.result-q { color: var(--gray-700); margin: 6px 0; line-height: 1.5; }
.result-your  { color: #EF4444; font-size: 11px; }
.result-right { color: var(--green); font-size: 11px; }

/* ===== UPLOAD ===== */
.upload-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 20px; box-shadow: var(--shadow); }
.upload-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--gray-800); }
.form-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 13px; outline: none; resize: vertical; font-family: inherit; transition: border-color .2s; }
.form-textarea:focus { border-color: var(--red); }
.upload-hint { font-size: 11px; color: var(--gray-400); margin: 6px 0 12px; }
.upload-msg { font-size: 13px; text-align: center; padding: 8px; border-radius: 8px; }
.upload-msg.ok  { color: var(--green); background: var(--green-lt); }
.upload-msg.err { color: #EF4444; background: #FEF2F2; }

/* ===== ADMIN ===== */
.admin-bank-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
.admin-bank-row  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.btn-toggle-on  { padding: 4px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--green); color: white; }
.btn-toggle-off { padding: 4px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--gray-200); color: var(--gray-500); }
.btn-del { flex: 1; padding: 7px; font-size: 12px; background: #FEF2F2; color: #EF4444; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

.admin-user-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
.user-name { font-size: 14px; font-weight: 600; }
.user-date { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.btn-role { font-size: 11px; padding: 5px 10px; background: var(--blue-lt); color: var(--blue); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-del-user { font-size: 11px; padding: 5px 10px; background: #FEF2F2; color: #EF4444; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

/* ===== PAGE BACK BTN ===== */
.back-btn { color: var(--red); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 14px; display: inline-flex; align-items: center; gap: 4px; }

/* ===== PRACTICE START BTN ===== */
.btn-practice-wrong { width: 100%; padding: 13px; background: linear-gradient(135deg, #EF4444, #DC2626); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(239,68,68,.25); }
.btn-practice-fav   { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), #B7950B); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(212,172,13,.25); }
</style>
</head>
<body>
<div id="app">

  <div v-if="!token" class="login-page">
    <div class="login-hero">
      <img src="https://cdn.urongda.com//images/normal/medium/tianjin-university-of-technology-and-education-logo-1024px.png" alt="TUTE">
      <h1>刷题宝 Pro</h1>
      <p>天津职业技术师范大学 · 一人上传，全班共享</p>
    </div>

    <div class="login-card">
      <div class="auth-tab-bar">
        <button @click="authTab='login'" :class="['auth-tab', authTab==='login'?'active':'']">登录</button>
        <button @click="authTab='register'" :class="['auth-tab', authTab==='register'?'active':'']">注册</button>
      </div>
      <div class="form-group">
        <input v-model="authForm.email" class="form-input" placeholder="请输入邮箱">
      </div>
      <div v-if="authTab==='register'" class="form-group code-row">
        <input v-model="code" class="form-input" placeholder="输入验证码" style="flex:1">
        <button @click="sendCode" :disabled="countdown>0" class="btn-code">
          {{ countdown>0 ? countdown+'s' : '获取验证码' }}
        </button>
      </div>
      <div class="form-group">
        <input v-model="authForm.password" type="password" class="form-input" placeholder="请输入密码（至少6位）">
      </div>
      <p v-if="authError" style="color:#EF4444;font-size:12px;margin-bottom:10px;">{{ authError }}</p>
      <button @click="doAuth" class="btn-primary">{{ authTab==='login'?'登录':'注册' }}</button>
    </div>

    <div style="padding:16px 20px 32px;">
      <div class="community-banner">
        <div class="icon-col">🚀</div>
        <div>
          <h3>共建共享题库，一起搞定考试！</h3>
          <p>有好的题目资源？欢迎上传到题库，让同学们一起受益。有使用建议？我们随时倾听。</p>

    <main v-if="page==='selectMode'">

      </div>

        <div class="score-chips">

          <div v-else>
            <button v-for="(opt,key) in currentPQ.options" :key="'e'+key"
              @click="examSelectOption(key)"
              :class="['opt-btn', examAnswers[practiceStep]===key?'selected-exam':'']">
              <span class="opt-key">{{ key }}.</span>{{ opt }}

          </div>

          <div v-if="practiceAnswered && practiceMode!=='exam'" class="feedback-box">
            <div :class="practiceSelectedOption===currentPQ.answer?'feedback-correct':'feedback-wrong'">
              {{ practiceSelectedOption===currentPQ.answer ? '🎉 回答正确！' : '❌ 回答错误' }}
            </div>
            <div class="feedback-ans">正确答案：<b>{{ currentPQ.answer }}. {{ currentPQ.options[currentPQ.answer] }}</b></div>
          </div>

        <button v-if="practiceMode!=='exam'" @click="nextQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '完成 ✓' : '下一题 →' }}</button>
        <button v-if="practiceMode==='exam'" @click="prevQuestion" :disabled="practiceStep===0" class="btn-prev">上一题</button>
        <button v-if="practiceMode==='exam'" @click="nextExamQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '交卷 ✓' : '下一题 →' }}</button>
      </div>

    <main v-if="page==='examResult'" style="overflow-y:auto;flex:1;padding-bottom:40px;">
      <div class="result-hero">

        <div class="result-sub">{{ examCorrectCount }} / {{ examQuestions.length }} 题正确</div>
      </div>
      <div style="padding:0 16px;">
        <div v-for="(q,i) in examQuestions" :key="i" :class="['result-item', examAnswers[i]===q.answer?'ok':'bad']">
          <div :class="examAnswers[i]===q.answer?'result-badge-ok':'result-badge-bad'">{{ examAnswers[i]===q.answer ? '✓ 正确' : '✗ 错误' }}</div>
          <div class="result-q">{{ q.title }}</div>
          <div v-if="examAnswers[i]!==q.answer" class="result-your">你的答案：{{ examAnswers[i]||'未作答' }}</div>

        <div v-if="uploadMsg" :class="['upload-msg', uploadMsg.startsWith('✅')?'ok':'err']" style="margin-top:10px;">{{ uploadMsg }}</div>

      </div>

      <div v-if="adminTab==='banks'">
        <div v-for="bank in adminBanks" :key="bank._id" class="admin-bank-card">
          <div class="admin-bank-row">
            <div>
              <div style="font-size:14px;font-weight:600;">{{ bank.bankName }}</div>
              <div style="font-size:11px;color:var(--gray-400);margin-top:2px;">
                上传者：{{ bank.uploaderNickname || maskEmail(bank.uploadedBy) || '神秘同学' }}
              </div>
            </div>
            <button @click="toggleBankStatus(bank)" :class="bank.isPublic?'btn-toggle-on':'btn-toggle-off'">
              {{ bank.isPublic ? '公开中' : '已隐藏' }}
            </button>
          </div>
          <div style="display:flex;gap:8px;">
            <button @click="deleteBank(bank._id)" class="btn-del">🗑 删除题库</button>
          </div>
        </div>
        <div v-if="adminBanks.length===0" class="empty"><div class="emoji">📭</div><div>暂无题库数据</div></div>
      </div>

      <div v-if="adminTab==='users'">
        <div v-for="user in adminUsers" :key="user._id" class="admin-user-card">
          <div>
            <div class="user-name">
              {{ user.nickname || maskEmail(user.email) }} 
              <span v-if="user.role==='admin'" style="color:var(--gold);font-size:12px;">👑 管理员</span>
            </div>
            <div class="user-date">注册：{{ new Date(user.createdAt).toLocaleDateString() }}</div>
          </div>
          <div v-if="user._id !== adminSelfId" style="display:flex;gap:6px;">
            <button @click="toggleRole(user)" class="btn-role">{{ user.role==='admin'?'降为普通':'升为管理员' }}</button>
            <button @click="deleteUser(user._id)" class="btn-del-user">删除</button>
          </div>
        </div>
        <div v-if="adminUsers.length===0" class="empty"><div class="emoji">👥</div><div>暂无用户</div></div>
      </div>
    </main>
  </template>

</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;
const API = 'https://quiz-server-ulpb.onrender.com/api';

createApp({
  setup() {
    const token = ref(localStorage.getItem('quiz_token') || '');
    const practiceLimit = ref(20);
    const currentUser = ref(JSON.parse(localStorage.getItem('quiz_user') || '{}'));
    const authTab = ref('login');
    const authForm = ref({ email: '', password: '' });
    const authError = ref('');
    const code = ref('');
    const countdown = ref(0);

    const isEditingProfile = ref(false);
    const editForm = ref({ nickname: '', gender: '保密', avatar: '⚡' });

    const api = async (path, options = {}) => {
      const res = await fetch(API + path, {
        ...options,
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': 'Bearer ' + token.value, 
          ...(options.headers || {}) 
        }
      });
      return res.json();
    };

    const sendCode = async () => {
      if (!authForm.value.email) { alert('请先填写邮箱'); return; }
      countdown.value = 60;
      const timer = setInterval(() => { countdown.value--; if (countdown.value <= 0) clearInterval(timer); }, 1000);
      const r = await fetch(API + '/send-code', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email: authForm.value.email }) });
      const data = await r.json();
      if (data.success) alert('验证码已发送！');
      else { alert(data.error); countdown.value = 0; }
    };

    const doAuth = async () => {
      authError.value = '';
      if (!authForm.value.email || !authForm.value.password) { authError.value = '请填写邮箱和密码'; return; }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(authForm.value.email)) { authError.value = '请输入有效的邮箱地址'; return; }
      const result = await api(`/${authTab.value}`, { method: 'POST', body: JSON.stringify({ ...authForm.value, code: code.value }) });
      if (result.success) {
        token.value = result.token;
        currentUser.value = result.user;
        localStorage.setItem('quiz_token', result.token);
        localStorage.setItem('quiz_user', JSON.stringify(result.user));
        fetchBanks(); loadMe();
      } else { authError.value = result.error; }
    };

    const logout = () => {
      token.value = ''; 
      currentUser.value = {};
      meData.value = {};
      wrongList.value = [];
      favoriteList.value = [];
      page.value = 'home';
      homeTab.value = 'banks';
      isEditingProfile.value = false;
      document.body.style.overflow = ''; 
      localStorage.removeItem('quiz_token'); 
      localStorage.removeItem('quiz_user');
    };

    const goTuteOfficial = () => {
      window.open('https://www.tute.edu.cn', '_blank');
    };

    const shareApp = () => {
      const shareUrl = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl)
          .then(() => alert('🚀 链接已复制到剪贴板，快分享给天职师大的同学们吧！'))
          .catch(() => alert('分享链接为：' + shareUrl));
      } else {
        alert('分享链接为：' + shareUrl);
      }
    };

    const showSuggest = () => {
      const s = prompt('💡 请输入你的建议（将通过邮件反馈给管理员）：');
      if (s && s.trim()) alert('感谢你的建议！我们会认真考虑 🙏');
    };

    const page = ref('home');
    const homeTab = ref('banks');
    const banks = ref([]);
    const meData = ref({});
    const wrongList = ref([]);
    const favoriteList = ref([]);

    const accuracy = computed(() => {
      if (!meData.value.stats || meData.value.stats.totalAnswered === 0) return '0%';
      return Math.round(meData.value.stats.totalCorrect / meData.value.stats.totalAnswered * 100) + '%';
    });

    const fetchBanks = async () => { const r = await api('/get-banks-list'); if (r.success) banks.value = r.data; };
    const loadMe = async () => { const r = await api('/me'); if (r.success) meData.value = r.data; };
    const loadWrong = async () => { const r = await api('/wrong-questions'); if (r.success) wrongList.value = r.data; };
    const loadFavorites = async () => { const r = await api('/favorites'); if (r.success) favoriteList.value = r.data; };
    const goHome = () => { page.value = 'home'; homeTab.value = 'banks'; };

    onMounted(() => { if (token.value) { fetchBanks(); loadMe(); } });

    const maskEmail = (email) => {
      if (!email || typeof email !== 'string') return '';
      const parts = email.split('@');
      if (parts.length < 2) return email;
      const name = parts[0];
      const domain = parts[1];
      if (name.length <= 3) return name + '***@' + domain;
      return name.substring(0, 3) + '***@' + domain;
    };

    const currentBank = ref({});
    const currentBankQuestions = ref([]);
    const openBank = async (bank) => {
      const r = await api('/get-bank/' + bank._id);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; page.value = 'selectMode'; }
    };

    const practiceMode = ref('sequential');
    const practiceQuestions = ref([]);
    const practiceStep = ref(0);
    const practiceAnswered = ref(false);
    const practiceSelectedOption = ref(null);
    const sessionCorrect = ref(0);
    const sessionWrong = ref(0);
    const sessionResults = ref([]);
    const examAnswers = ref([]);
    const examQuestions = ref([]);

    const currentPQ = computed(() => practiceQuestions.value[practiceStep.value] || {});
    const isFavorited = computed(() => {
      if (!meData.value.favorites) return false;
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return false;
      return meData.value.favorites.some(f => f.bankId === currentBank.value._id && f.questionIndex === q._origIndex);
    });

    const shuffle = (arr) => arr.map(v => ({v, s: Math.random()})).sort((a,b) => a.s-b.s).map(x => x.v);

    const startPractice = (mode) => {
      practiceMode.value = mode; practiceStep.value = 0; practiceAnswered.value = false;
      practiceSelectedOption.value = null; sessionCorrect.value = 0; sessionWrong.value = 0;
      sessionResults.value = []; examAnswers.value = [];
      let qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i}));
      if (mode === 'random') qs = shuffle(qs);
      else if (mode === 'exam') { qs = shuffle(qs).slice(0, Math.min(20, qs.length)); examAnswers.value = new Array(qs.length).fill(null); }
      else if (mode === 'slim') {
        const wrongIdxSet = new Set((meData.value.wrongQuestions||[]).filter(w => w.bankId===currentBank.value._id).map(w => w.questionIndex));
        qs = qs.filter(q => wrongIdxSet.has(q._origIndex));
        if (qs.length === 0) { alert('没有错题，改用顺序练习'); qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i})); }
      }
      if (mode !== 'exam' && practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
      practiceQuestions.value = qs; examQuestions.value = qs; page.value = 'practice';
    };

    const startWrongPractice = async () => {
      await loadWrong();
      if (wrongList.value.length === 0) return;
      const firstBankId = wrongList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; startPractice('slim'); }
    };

    const startFavPractice = async () => {
      if (favoriteList.value.length === 0) return;
      const firstBankId = favoriteList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) {
        currentBank.value = {...bank}; currentBankQuestions.value = r.data;
        practiceMode.value = 'random'; practiceStep.value = 0; practiceAnswered.value = false;
        practiceSelectedOption.value = null; sessionCorrect.value = 0; sessionWrong.value = 0; sessionResults.value = [];
        const favIdxSet = new Set(favoriteList.value.filter(f => f.bankId===firstBankId).map(f => f.questionIndex));
        let qs = r.data.map((q,i) => ({...q, _origIndex: i})).filter(q => favIdxSet.has(q._origIndex));
        if (practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
        practiceQuestions.value = qs; page.value = 'practice';
      }
    };

    const selectOption = (key) => {
      if (practiceAnswered.value || practiceMode.value === 'exam') return;
      practiceSelectedOption.value = key; practiceAnswered.value = true;
      const isCorrect = key === currentPQ.value.answer;
      if (isCorrect) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect });
    };

    const examSelectOption = (key) => { examAnswers.value[practiceStep.value] = key; };

    const getPracticeOptionClass = (key) => {
      if (!practiceAnswered.value) return '';
      if (key === currentPQ.value.answer) return 'correct';
      if (practiceSelectedOption.value === key) return 'wrong';
      return 'dim';
    };

    const nextQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) {
        practiceStep.value++; practiceAnswered.value = false; practiceSelectedOption.value = null;
      } else {
        if (sessionResults.value.length > 0) await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
        alert(`练习完成！共${practiceQuestions.value.length}题，答对${sessionCorrect.value}题`);
        goHome();
      }
    };

    const nextExamQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) { practiceStep.value++; }
      else {
        const results = examQuestions.value.map((q,i) => ({ questionIndex: q._origIndex, isCorrect: examAnswers.value[i] === q.answer }));
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results }) });
        await loadMe(); page.value = 'examResult';
      }
    };

    const prevQuestion = () => {
      if (practiceStep.value > 0) { practiceStep.value--; practiceAnswered.value = false; practiceSelectedOption.value = null; }
    };

    const exitPractice = async () => {
      if (sessionResults.value.length > 0 && practiceMode.value !== 'exam') {
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
      }
      goHome();
    };

    const examCorrectCount = computed(() => examQuestions.value.filter((q,i) => examAnswers.value[i] === q.answer).length);
    const examScore = computed(() => examQuestions.value.length === 0 ? 0 : Math.round(examCorrectCount.value / examQuestions.value.length * 100));
    const examScoreEmoji = computed(() => examScore.value >= 90 ? '🏆' : examScore.value >= 60 ? '😊' : '😢');

    const toggleFavorite = async () => {
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return;
      await api('/toggle-favorite', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, questionIndex: q._origIndex }) });
      await loadMe();
    };

    const uploadForm = ref({ bankName: '', text: '' });
    const uploading = ref(false);
    const uploadMsg = ref('');

    const submitUpload = async () => {
      if (!uploadForm.value.bankName || !uploadForm.value.text) { uploadMsg.value = '❌ 请填写题库名称和题目内容'; return; }
      uploading.value = true; uploadMsg.value = '';
      const r = await api('/upload-bank', { method: 'POST', body: JSON.stringify(uploadForm.value) });
      uploading.value = false;
      if (r.success) { uploadMsg.value = '✅ ' + r.message; uploadForm.value = { bankName: '', text: '' }; fetchBanks(); }
      else uploadMsg.value = '❌ ' + r.error;
    };

    const adminTab = ref('banks');
    const adminBanks = ref([]);
    const adminUsers = ref([]);
    const adminSelfId = computed(() => {
      if (!token.value) return '';
      try { return JSON.parse(atob(token.value.split('.')[1])).id; } catch { return ''; }
    });

    const loadAdminBanks = async () => { const r = await api('/admin/banks'); if (r.success) adminBanks.value = r.data; };
    const loadAdminUsers = async () => { const r = await api('/admin/users'); if (r.success) adminUsers.value = r.data; };

    const toggleBankStatus = async (bank) => {
      const r = await api(`/admin/banks/${bank._id}/toggle`, { method: 'PUT' });
      if (r.success || r.message) bank.isPublic = !bank.isPublic;
      else alert('操作失败: ' + (r.error || '未获授权'));
    };

    const deleteBank = async (id) => {
      if (!confirm('确认删除该题库？')) return;
      await api('/admin/banks/' + id, { method: 'DELETE' });
      loadAdminBanks(); fetchBanks();
    };

    const deleteUser = async (id) => {
      if (!confirm('确认删除该用户？')) return;
      await api('/admin/users/' + id, { method: 'DELETE' });
      loadAdminUsers();
    };

    const toggleRole = async (user) => {
      const newRole = user.role === 'admin' ? 'user' : 'admin';
      await api('/admin/users/' + user._id + '/role', { method: 'PUT', body: JSON.stringify({ role: newRole }) });
      loadAdminUsers();
    };

    return {
      token, currentUser, authTab, authForm, authError, code, countdown, sendCode, doAuth, logout, showSuggest,
      isEditingProfile, editForm,
      clearStats, maskEmail, goTuteOfficial, shareApp,
      page, homeTab, banks, meData, wrongList, favoriteList, accuracy, loadMe, loadWrong, loadFavorites, goHome, fetchBanks,
      currentBank, currentBankQuestions, openBank,
      practiceMode, practiceQuestions, practiceStep, practiceAnswered, practiceSelectedOption,
      sessionCorrect, sessionWrong, examAnswers, examQuestions, currentPQ, isFavorited,
      startPractice, startWrongPractice, startFavPractice,
      selectOption, examSelectOption, getPracticeOptionClass, nextQuestion, nextExamQuestion, prevQuestion, exitPractice,
      examCorrectCount, examScore, examScoreEmoji, toggleFavorite,
      uploadForm, uploading, uploadMsg, submitUpload,
      adminTab, adminBanks, adminUsers, adminSelfId, loadAdminBanks, loadAdminUsers,
      toggleBankStatus, deleteBank, deleteUser, toggleRole, practiceLimit,
    };
  }
}).mount('#app');
</script>
</body>
</html>
