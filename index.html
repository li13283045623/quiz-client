<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题宝 Pro · 天津职业技术师范大学</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.prod.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #8E1045;
  --red-dk: #5C0B2E;
  --red-lt: #FCE4EC;
  --gold:   #D4AC0D;
  --gold-lt:#FEF9E7;
  --blue:   #2563EB;
  --blue-lt:#EFF6FF;
  --gray-50: #F8FAFC;
  --gray-100:#F1F5F9;
  --gray-200:#E2E8F0;
  --gray-400:#94A3B8;
  --gray-500:#64748B;
  --gray-700:#334155;
  --gray-800:#1E293B;
  --green:  #16A34A;
  --green-lt:#F0FDF4;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
}

/* ===== 暗黑模式变量 ===== */
[data-theme="dark"] {
  --gray-50: #0F172A;
  --gray-100: #1E293B;
  --gray-200: #334155;
  --gray-400: #94A3B8;
  --gray-500: #CBD5E1;
  --gray-700: #E2E8F0;
  --gray-800: #E2E8F0;
  --red-lt: #3B1528;
  --gold-lt: #3B3510;
  --blue-lt: #1E2A4A;
  --green-lt: #1A2E1A;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

#app { max-width: 680px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ===== SCHOOL HEADER BANNER ===== */
.school-banner {
  background: linear-gradient(120deg, #6A0F35 0%, #8E1045 40%, #A01250 70%, #8E1045 100%);
  padding: 24px 24px;
  display: flex; align-items: center; gap: 18px;
  box-shadow: 0 4px 18px rgba(142,16,69,.45);
  position: relative; overflow: hidden;
}
.school-banner::before {
  content: ''; position: absolute; right: -20px; top: -20px;
  width: 140px; height: 140px; background: rgba(255,255,255,.08); border-radius: 50%;
}
.school-banner img { width: 64px; height: 64px; filter: brightness(0) invert(1); flex-shrink: 0; }
.school-banner-text { color: white; }
.school-banner-text .cn { font-size: 22px; font-weight: 800; letter-spacing: 1.8px; text-shadow: 0 2px 4px rgba(0,0,0,.25); }
.school-banner-text .en { font-size: 11px; opacity: .85; letter-spacing: .6px; margin-top: 5px; font-weight: 500; }

/* ===== APP HEADER ===== */
.app-header { background: white; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
[data-theme="dark"] .app-header { background: var(--gray-100); }
.app-header-inner { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
.app-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; }
.app-logo .icon { width: 38px; height: 38px; background: linear-gradient(135deg, #9C1250, #8E1045); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow: 0 2px 6px rgba(142,16,69,.2); }
.app-logo .name { font-size: 17px; font-weight: 800; color: var(--red); letter-spacing: 0.5px; }
.app-logo .sub  { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-admin { font-size: 11px; padding: 5px 12px; background: var(--gold-lt); color: #92630A; border-radius: 20px; border: 1px solid #F0D060; font-weight: 600; cursor: pointer; }
.btn-menu { background: none; border: none; font-size: 24px; color: var(--gray-700); cursor: pointer; padding: 4px 8px; display: flex; align-items: center; justify-content: center; transition: color .2s; }
.btn-menu:hover { color: var(--red); }

/* ===== TABS ===== */
.tab-bar { display: flex; border-top: 1px solid var(--gray-100); background: white; }
[data-theme="dark"] .tab-bar { background: var(--gray-100); }
.tab-btn { flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; font-weight: 500; color: var(--gray-500); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

/* ===== SIDE DRAWER ===== */
.drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
.drawer-overlay.active { opacity: 1; pointer-events: auto; }
.drawer-content { position: fixed; top: 0; right: -340px; width: 340px; height: 100vh; background: white; z-index: 1000; box-shadow: -4px 0 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; transition: right .3s cubic-bezier(0.16, 1, 0.3, 1); padding: 20px; overflow-y: auto; }
[data-theme="dark"] .drawer-content { background: var(--gray-100); }
.drawer-content.active { right: 0; }
.drawer-close { background: none; border: none; font-size: 20px; color: var(--gray-400); cursor: pointer; align-self: flex-start; margin-bottom: 14px; }
.drawer-close:hover { color: var(--red); }

/* ===== 暗黑模式切换开关 ===== */
.dark-mode-switch { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 10px; margin-bottom: 14px; }
.dark-mode-switch .label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
.switch-track { width: 44px; height: 24px; border-radius: 12px; background: var(--gray-200); position: relative; cursor: pointer; transition: background .3s; }
.switch-track.active { background: var(--red); }
.switch-thumb { width: 20px; height: 20px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: transform .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.switch-track.active .switch-thumb { transform: translateX(20px); }

/* ===== 个人资料卡片 ===== */
.stats-hero { background: linear-gradient(135deg, #9C1250 0%, #8E1045 100%); border-radius: var(--radius); padding: 18px; color: white; margin-bottom: 14px; box-shadow: 0 4px 16px rgba(142,16,69,.25); }
.user-profile-box { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 14px; }
.user-avatar-circle { width: 48px; height: 48px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex-shrink: 0; }
.user-info-text { flex: 1; min-width: 0; }
.user-info-text .name-row { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.user-info-text .gender-tag { font-size: 11px; padding: 1px 6px; background: rgba(255,255,255,0.2); border-radius: 10px; font-weight: normal; }
.user-info-text .email-row { font-size: 12px; opacity: 0.75; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stats-hero .greeting { font-size: 11px; opacity: .8; }
.stats-hero .big-num  { font-size: 32px; font-weight: 800; line-height: 1.1; margin: 2px 0; }
.stats-hero .label    { font-size: 11px; opacity: .8; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--gray-50); border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 10px; text-align: center; }
.stat-card .num { font-size: 20px; font-weight: 800; }
.stat-card .lbl { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.menu-section-title { font-size: 13px; font-weight: 700; color: var(--gray-500); margin: 16px 0 8px; letter-spacing: 0.5px; }
.action-list { display: flex; flex-direction: column; gap: 6px; }
.btn-action-item { width: 100%; padding: 11px 14px; text-align: left; background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--gray-700); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
.btn-action-item:hover { background: var(--gray-100); color: var(--red); }
.btn-action-item.danger:hover { color: #EF4444; background: #FEF2F2; border-color: #FEE2E2; }
[data-theme="dark"] .btn-action-item.danger:hover { background: #3B1515; border-color: #5C2020; }
.btn-action-item.disabled { opacity: 0.5; cursor: not-allowed; background: var(--gray-50); color: var(--gray-400); }
.btn-action-item.disabled:hover { color: var(--gray-400); background: var(--gray-50); }
.edit-profile-box { background: var(--gray-50); border: 1px dashed var(--gray-200); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
.edit-title { font-size: 12px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }

/* ===== LOGIN PAGE ===== */
.login-page { flex: 1; display: flex; flex-direction: column; }
.login-hero { background: linear-gradient(160deg, #5C0B2E 0%, #8E1045 55%, #9C1250 100%); padding: 50px 24px 40px; text-align: center; position: relative; overflow: hidden; }
.login-hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; background: rgba(255,255,255,.05); border-radius: 50%; }
.login-hero img { width: 72px; height: 72px; margin-bottom: 16px; filter: brightness(0) invert(1); position: relative; z-index: 1; }
.login-hero h1 { color: white; font-size: 26px; font-weight: 800; position: relative; z-index: 1; letter-spacing: 1px; }
.login-hero p  { color: rgba(255,255,255,.8); font-size: 14px; margin-top: 6px; position: relative; z-index: 1; }
.login-card { background: white; margin: -20px 20px 0; border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 24px; position: relative; z-index: 2; }
[data-theme="dark"] .login-card { background: var(--gray-100); }
.auth-tab-bar { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--gray-100); }
.auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; color: var(--gray-400); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.auth-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }
.form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 14px; outline: none; transition: border-color .2s; font-family: inherit; background: white; }
.form-input:focus { border-color: var(--red); }
[data-theme="dark"] .form-input { background: var(--gray-100); color: var(--gray-800); }
.form-group { margin-bottom: 12px; }
.code-row { display: flex; gap: 8px; }
.btn-code { padding: 12px 14px; background: var(--red); color: white; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.btn-code:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
.btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, #9C1250, #8E1045); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity .2s; box-shadow: 0 3px 12px rgba(142,16,69,.3); }
.btn-primary:hover { opacity: .9; }

/* ===== COMMUNITY BANNER ===== */
.community-banner { margin: 16px 0; background: linear-gradient(135deg, #1E3A5F 0%, #2563EB 100%); border-radius: var(--radius); padding: 18px; display: flex; gap: 14px; align-items: flex-start; color: white; box-shadow: 0 4px 14px rgba(37,99,235,.25); }
.community-banner .icon-col { font-size: 32px; flex-shrink: 0; line-height: 1; }
.community-banner h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
.community-banner p  { font-size: 12px; opacity: .88; line-height: 1.6; }
.community-banner .tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.community-banner .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,.18); cursor: pointer; font-weight: 500; transition: background .2s; }
.community-banner .tag:hover { background: rgba(255,255,255,.28); }

/* ===== MAIN ===== */
main { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; margin-top: 4px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--gray-700); }
.btn-upload { font-size: 12px; padding: 6px 14px; background: var(--red); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; }

/* ===== 搜索框 ===== */
.search-box { margin-bottom: 10px; }
.search-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 13px; outline: none; font-family: inherit; background: white; transition: border-color .2s; }
.search-input:focus { border-color: var(--red); }
[data-theme="dark"] .search-input { background: var(--gray-100); color: var(--gray-800); }

/* ===== 标签筛选 ===== */
.tag-filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag-filter-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--gray-200); background: white; color: var(--gray-500); cursor: pointer; font-weight: 500; transition: all .2s; }
.tag-filter-btn:hover { border-color: var(--red); color: var(--red); }
.tag-filter-btn.active { background: var(--red); color: white; border-color: var(--red); }
[data-theme="dark"] .tag-filter-btn { background: var(--gray-100); color: var(--gray-500); }

/* ===== 题库标签样式 ===== */
.bank-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.bank-tag { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: var(--blue-lt); color: var(--blue); font-weight: 500; }

/* ===== CARD ===== */
.card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; transition: border-color .2s, transform .15s; }
[data-theme="dark"] .card { background: var(--gray-100); }
.card:hover { border-color: var(--red); transform: translateY(-1px); }
.card-row { display: flex; justify-content: space-between; align-items: flex-start; }
.card-name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
.card-meta { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
.card-arrow { color: var(--gray-200); font-size: 20px; line-height: 1; }

/* ===== EMPTY STATE ===== */
.empty { text-align: center; padding: 48px 0; color: var(--gray-400); font-size: 14px; }
.empty .emoji { font-size: 40px; margin-bottom: 12px; }

/* ===== WRONG / FAV LIST ===== */
.q-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
[data-theme="dark"] .q-card { background: var(--gray-100); }
.q-card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.q-title { font-size: 13px; color: var(--gray-700); flex: 1; line-height: 1.5; }
.q-wrong-badge { font-size: 11px; color: #EF4444; white-space: nowrap; font-weight: 600; }
.q-bank { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.q-answer { font-size: 11px; color: var(--green); margin-top: 4px; font-weight: 600; }
.q-type-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
.q-type-single { background: var(--blue-lt); color: var(--blue); }
.q-type-multiple { background: #FEF3C7; color: #D97706; }
.q-type-judge { background: var(--green-lt); color: var(--green); }

/* ===== SELECT MODE ===== */
.bank-info-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-200); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
[data-theme="dark"] .bank-info-card { background: var(--gray-100); }
.bank-info-card h2 { font-size: 16px; font-weight: 700; }
.bank-info-card p  { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
.limit-bar { background: var(--gray-100); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
.limit-label { font-size: 11px; color: var(--gray-500); font-weight: 600; margin-bottom: 8px; }
.limit-btns { display: flex; gap: 6px; }
.limit-btn { flex: 1; padding: 7px 4px; border-radius: 8px; font-size: 12px; border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600); cursor: pointer; font-weight: 500; transition: all .15s; text-align: center; }
.limit-btn.active { background: var(--red); color: white; border-color: var(--red); font-weight: 700; }
[data-theme="dark"] .limit-btn { background: var(--gray-100); color: var(--gray-500); }
.mode-card { background: white; border: 1.5px solid var(--gray-100); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; transition: border-color .2s, transform .15s; }
[data-theme="dark"] .mode-card { background: var(--gray-100); }
.mode-card:hover { border-color: var(--red); transform: translateY(-1px); }
.mode-icon { font-size: 24px; flex-shrink: 0; }
.mode-name { font-size: 14px; font-weight: 700; color: var(--gray-800); }
.mode-desc { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* ===== PRACTICE ===== */
.progress-track { height: 3px; background: var(--gray-100); }
.progress-fill { height: 3px; background: linear-gradient(90deg, var(--red), #9C1250); transition: width .3s ease; }
.practice-topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; font-size: 13px; color: var(--gray-500); }
.btn-exit { color: var(--red); background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.score-chips { display: flex; gap: 8px; font-size: 12px; }
.chip-ok  { background: var(--green-lt); color: var(--green); padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.chip-err { background: #FEF2F2; color: #EF4444; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
[data-theme="dark"] .chip-err { background: #3B1515; }
.q-box { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
[data-theme="dark"] .q-box { background: var(--gray-100); }
.q-box-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-type-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
.q-type-badge.single { background: var(--blue-lt); color: var(--blue); }
.q-type-badge.multiple { background: #FEF3C7; color: #D97706; }
.q-type-badge.judge { background: var(--green-lt); color: var(--green); }
.btn-fav { font-size: 20px; background: none; border: none; cursor: pointer; line-height: 1; }
.btn-report { font-size: 16px; background: none; border: none; cursor: pointer; line-height: 1; margin-left: 6px; opacity: 0.6; transition: opacity .2s; }
.btn-report:hover { opacity: 1; }
.q-text { font-size: 15px; color: var(--gray-800); line-height: 1.7; }
.opt-btn { width: 100%; text-align: left; padding: 12px 16px; border-radius: 10px; border: 1.5px solid var(--gray-200); background: white; font-size: 14px; cursor: pointer; margin-bottom: 8px; transition: all .15s; font-family: inherit; display: flex; align-items: flex-start; gap: 8px; }
[data-theme="dark"] .opt-btn { background: var(--gray-100); color: var(--gray-800); }
.opt-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-lt); }
.opt-btn:disabled { cursor: not-allowed; }
.opt-btn.correct  { border-color: var(--green); background: var(--green-lt); color: var(--green); font-weight: 600; }
.opt-btn.wrong    { border-color: #EF4444; background: #FEF2F2; color: #EF4444; font-weight: 600; }
[data-theme="dark"] .opt-btn.wrong { background: #3B1515; }
.opt-btn.dim      { border-color: var(--gray-100); background: var(--gray-50); opacity: .5; }
.opt-btn.selected-exam { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); font-weight: 600; }
.opt-btn.selected-multiple { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); font-weight: 600; }
.opt-key { font-weight: 700; flex-shrink: 0; }

/* 判断题专用按钮 */
.judge-btns { display: flex; gap: 10px; margin-bottom: 8px; }
.judge-btn { flex: 1; padding: 14px; border-radius: 10px; border: 1.5px solid var(--gray-200); background: white; font-size: 15px; cursor: pointer; text-align: center; font-weight: 600; transition: all .15s; font-family: inherit; }
[data-theme="dark"] .judge-btn { background: var(--gray-100); color: var(--gray-800); }
.judge-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-lt); }
.judge-btn:disabled { cursor: not-allowed; }
.judge-btn.correct  { border-color: var(--green); background: var(--green-lt); color: var(--green); }
.judge-btn.wrong    { border-color: #EF4444; background: #FEF2F2; color: #EF4444; }
[data-theme="dark"] .judge-btn.wrong { background: #3B1515; }
.judge-btn.dim      { border-color: var(--gray-100); background: var(--gray-50); opacity: .5; }
.judge-btn.selected-exam { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
.judge-btn.selected-multiple { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }

.feedback-box { border-radius: 10px; border: 1.5px dashed var(--gray-200); padding: 14px; background: var(--gray-50); font-size: 13px; margin-top: 4px; }
.feedback-correct { color: var(--green); font-weight: 700; font-size: 14px; }
.feedback-wrong   { color: #EF4444; font-weight: 700; font-size: 14px; }
.feedback-ans { color: var(--gray-600); margin-top: 6px; }
.feedback-ans b { color: var(--green); }

/* ===== AI 解析卡片 ===== */
.ai-explain-btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: 1.5px solid var(--blue); background: var(--blue-lt); color: var(--blue); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; }
.ai-explain-btn:hover { background: var(--blue); color: white; }
.ai-explain-btn:disabled { opacity: .5; cursor: not-allowed; }
.ai-explain-card { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); border-radius: 10px; border: 1.5px solid #BFDBFE; padding: 14px; margin-top: 8px; font-size: 13px; line-height: 1.7; color: var(--gray-700); white-space: pre-wrap; }
[data-theme="dark"] .ai-explain-card { background: linear-gradient(135deg, #1E2A4A 0%, #1E3A5F 100%); border-color: #2563EB; }

.practice-footer { padding: 12px 16px; background: white; border-top: 1px solid var(--gray-100); display: flex; gap: 10px; }
[data-theme="dark"] .practice-footer { background: var(--gray-100); }
.btn-prev { flex: 1; padding: 12px; border-radius: 10px; background: var(--gray-100); color: var(--gray-700); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-prev:disabled { opacity: .4; cursor: not-allowed; }
.btn-next { flex: 2; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #9C1250, #8E1045); color: white; border: none; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(142,16,69,.25); }

/* ===== EXAM RESULT ===== */
.result-hero { text-align: center; padding: 32px 16px 20px; }
.result-emoji { font-size: 56px; }
.result-score { font-size: 48px; font-weight: 800; color: var(--gray-800); line-height: 1; margin: 8px 0 4px; }
.result-sub   { font-size: 14px; color: var(--gray-400); }
.result-pass-badge { display: inline-block; font-size: 16px; font-weight: 800; padding: 6px 20px; border-radius: 20px; margin-top: 8px; }
.result-pass-badge.pass { background: var(--green-lt); color: var(--green); border: 1.5px solid #BBF7D0; }
.result-pass-badge.fail { background: #FEF2F2; color: #EF4444; border: 1.5px solid #FECACA; }
.result-item { background: white; border-radius: 10px; border-width: 1.5px; border-style: solid; padding: 14px; margin-bottom: 8px; font-size: 13px; }
[data-theme="dark"] .result-item { background: var(--gray-100); }
.result-item.ok  { border-color: #BBF7D0; }
.result-item.bad { border-color: #FECACA; }
.result-badge-ok  { color: var(--green); font-weight: 700; font-size: 11px; }
.result-badge-bad { color: #EF4444; font-weight: 700; font-size: 11px; }
.result-q { color: var(--gray-700); margin: 6px 0; line-height: 1.5; }
.result-your  { color: #EF4444; font-size: 11px; }
.result-right { color: var(--green); font-size: 11px; }

/* ===== UPLOAD ===== */
.upload-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 20px; box-shadow: var(--shadow); }
[data-theme="dark"] .upload-card { background: var(--gray-100); }
.upload-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--gray-800); }
.form-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 13px; outline: none; resize: vertical; font-family: inherit; transition: border-color .2s; }
.form-textarea:focus { border-color: var(--red); }
[data-theme="dark"] .form-textarea { background: var(--gray-100); color: var(--gray-800); }
.upload-hint { font-size: 11px; color: var(--gray-400); margin: 6px 0 12px; }
.upload-msg { font-size: 13px; text-align: center; padding: 8px; border-radius: 8px; }
.upload-msg.ok  { color: var(--green); background: var(--green-lt); }
.upload-msg.err { color: #EF4444; background: #FEF2F2; }
[data-theme="dark"] .upload-msg.err { background: #3B1515; }
.upload-msg.pending { color: var(--blue); background: var(--blue-lt); }

/* ===== ADMIN ===== */
.admin-bank-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
[data-theme="dark"] .admin-bank-card { background: var(--gray-100); }
.admin-bank-row  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.btn-toggle-on  { padding: 4px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--green); color: white; }
.btn-toggle-off { padding: 4px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--gray-200); color: var(--gray-500); }
.btn-del { flex: 1; padding: 7px; font-size: 12px; background: #FEF2F2; color: #EF4444; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
[data-theme="dark"] .btn-del { background: #3B1515; }
.admin-user-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; }
[data-theme="dark"] .admin-user-card { background: var(--gray-100); }
.user-name { font-size: 14px; font-weight: 600; }
.user-date { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.btn-role { font-size: 11px; padding: 5px 10px; background: var(--blue-lt); color: var(--blue); border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-del-user { font-size: 11px; padding: 5px 10px; background: #FEF2F2; color: #EF4444; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
[data-theme="dark"] .btn-del-user { background: #3B1515; }
.back-btn { color: var(--red); background: none; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 14px; display: inline-flex; align-items: center; gap: 4px; }
.btn-practice-wrong { width: 100%; padding: 13px; background: linear-gradient(135deg, #EF4444, #DC2626); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(239,68,68,.25); }
.btn-practice-fav   { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), #B7950B); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(212,172,13,.25); }

/* 上传解析进度条 */
.upload-progress { margin-top: 12px; }
.upload-progress-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
.upload-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), #3B82F6); border-radius: 3px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.upload-progress-text { font-size: 12px; color: var(--blue); margin-top: 6px; text-align: center; }

/* ===== 报错管理 ===== */
.report-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); }
[data-theme="dark"] .report-card { background: var(--gray-100); }
.report-card .report-q { font-size: 13px; color: var(--gray-700); line-height: 1.5; margin-bottom: 6px; }
.report-card .report-reason { font-size: 12px; color: var(--gray-500); background: var(--gray-50); padding: 8px; border-radius: 8px; margin-bottom: 8px; }
.report-card .report-meta { font-size: 11px; color: var(--gray-400); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.btn-resolved { padding: 4px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--green); color: white; }
.btn-resolved:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

/* ===== 动态/社区样式 ===== */
.post-input-box { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow); }
[data-theme="dark"] .post-input-box { background: var(--gray-100); }
.post-input-box textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 13px; outline: none; resize: none; font-family: inherit; background: var(--gray-50); min-height: 80px; transition: border-color .2s; }
[data-theme="dark"] .post-input-box textarea { background: var(--gray-200); color: var(--gray-800); }
.post-input-box textarea:focus { border-color: var(--red); }
.post-input-box .post-input-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.post-input-box .char-count { font-size: 11px; color: var(--gray-400); }
.post-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
[data-theme="dark"] .post-card { background: var(--gray-100); }
.post-card .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.post-card .post-avatar { width: 36px; height: 36px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.post-card .post-nickname { font-size: 14px; font-weight: 600; color: var(--gray-800); }
.post-card .post-time { font-size: 11px; color: var(--gray-400); }
.post-card .post-content { font-size: 14px; color: var(--gray-700); line-height: 1.7; margin-bottom: 10px; word-break: break-word; }
.post-actions { display: flex; gap: 16px; align-items: center; padding-top: 10px; border-top: 1px solid var(--gray-100); }
.post-actions button { background: none; border: none; font-size: 13px; color: var(--gray-500); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: color .2s; padding: 4px 8px; border-radius: 8px; }
.post-actions button:hover { background: var(--gray-50); }
.post-actions button.liked { color: #EF4444; font-weight: 600; }
.post-actions button.delete-btn { color: var(--gray-400); margin-left: auto; }
.post-actions button.delete-btn:hover { color: #EF4444; background: #FEF2F2; }
.comment-item { padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
.comment-item:last-child { border-bottom: none; }
.comment-item .comment-nickname { font-weight: 600; color: var(--gray-700); font-size: 12px; }
.comment-item .comment-time { font-size: 11px; color: var(--gray-400); margin-left: 8px; }
.comment-item .comment-text { color: var(--gray-600); margin-top: 4px; line-height: 1.5; }
.comment-input-row { display: flex; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--gray-100); }
.comment-input-row input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 12px; outline: none; font-family: inherit; background: var(--gray-50); }
[data-theme="dark"] .comment-input-row input { background: var(--gray-200); color: var(--gray-800); }
.comment-input-row input:focus { border-color: var(--red); }
.comment-input-row button { padding: 8px 14px; border-radius: 8px; border: none; background: var(--red); color: white; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.comments-section { background: var(--gray-50); border-radius: 10px; padding: 10px 12px; margin-top: 10px; }
[data-theme="dark"] .comments-section { background: var(--gray-200); }

/* ===== 排行榜样式 ===== */
.leaderboard-card { background: white; border-radius: var(--radius); border: 1.5px solid var(--gray-100); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
[data-theme="dark"] .leaderboard-card { background: var(--gray-100); }
.leaderboard-card .rank-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; }
.leaderboard-card .rank-badge.gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: white; }
.leaderboard-card .rank-badge.silver { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: white; }
.leaderboard-card .rank-badge.bronze { background: linear-gradient(135deg, #CD7F32, #A0522D); color: white; }
.leaderboard-card .rank-badge.normal { background: var(--gray-100); color: var(--gray-500); }
.leaderboard-card .lb-avatar { width: 40px; height: 40px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.leaderboard-card .lb-info { flex: 1; min-width: 0; }
.leaderboard-card .lb-name { font-size: 14px; font-weight: 600; color: var(--gray-800); }
.leaderboard-card .lb-count { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* ===== 副管理员标签 ===== */
.subadmin-tag { font-size: 11px; padding: 1px 8px; background: var(--gold-lt); color: var(--gold); border: 1px solid #F0D060; border-radius: 10px; font-weight: 700; }

/* 支持作者弹窗 */
.support-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.support-modal { background: white; border-radius: var(--radius); padding: 24px; width: 320px; max-width: 90vw; text-align: center; box-shadow: var(--shadow-lg); }
[data-theme="dark"] .support-modal { background: var(--gray-100); }
.support-modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 16px; color: var(--gray-800); }
.support-choices { display: flex; gap: 10px; margin-bottom: 16px; }
.support-choice-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid var(--gray-200); background: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.support-choice-btn:hover { border-color: var(--red); background: var(--red-lt); }
.support-choice-btn.active-wechat { border-color: #07C160; background: #E8F8EE; color: #07C160; }
.support-choice-btn.active-alipay { border-color: #1677FF; background: #E8F0FF; color: #1677FF; }
.support-qr-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
.support-qr-card img { width: 200px; height: 200px; object-fit: cover; border-radius: 8px; }
.support-qr-label { font-size: 12px; color: var(--gray-500); margin-top: 8px; }
.btn-close-modal { width: 100%; padding: 12px; border-radius: 10px; background: var(--gray-100); color: var(--gray-700); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }

/* 题库评分 */
.rating-stars { display: flex; gap: 2px; margin-top: 4px; }
.rating-star { font-size: 12px; color: var(--gray-200); cursor: pointer; }
.rating-star.filled { color: #F59E0B; }
.rating-info { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.rate-section { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 10px; background: var(--gray-50); border-radius: 10px; }
.rate-section .rate-label { font-size: 12px; color: var(--gray-500); }
.rate-btn { padding: 4px 12px; border-radius: 20px; border: 1.5px solid var(--gray-200); background: white; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
.rate-btn:hover { border-color: #F59E0B; background: #FFFBEB; }

/* 考试倒计时 */
.exam-timer { background: linear-gradient(135deg, #EF4444, #DC2626); color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.exam-timer.warning { background: linear-gradient(135deg, #F59E0B, #D97706); animation: timerBlink 1s ease-in-out infinite; }
@keyframes timerBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.exam-duration-bar { background: var(--gray-100); border-radius: 10px; padding: 12px; margin-bottom: 14px; }
.exam-duration-label { font-size: 11px; color: var(--gray-500); font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app">

  <div v-if="!token" class="login-page">
    <div class="login-hero">
      <img src="https://cdn.urongda.com//images/normal/medium/tianjin-university-of-technology-and-education-logo-1024px.png" alt="TUTE">
      <h1>刷题宝 Pro</h1>
      <p>天津职业技术师范大学 · 一人上传，全班共享</p>
    </div>

    <div class="login-card">
      <div class="auth-tab-bar">
        <button @click="authTab='login'" :class="['auth-tab', authTab==='login'?'active':'']">登录</button>
        <button @click="authTab='register'" :class="['auth-tab', authTab==='register'?'active':'']">注册</button>
      </div>
      <div class="form-group">
        <input v-model="authForm.email" class="form-input" placeholder="请输入邮箱">
      </div>
      <div v-if="authTab==='register'" class="form-group code-row">
        <input v-model="code" class="form-input" placeholder="输入验证码" style="flex:1">
        <button @click="sendCode" :disabled="countdown>0" class="btn-code">
          {{ countdown>0 ? countdown+'s' : '获取验证码' }}
        </button>
      </div>
      <div class="form-group">
        <input v-model="authForm.password" type="password" class="form-input" placeholder="请输入密码（至少6位）">
      </div>
      <p v-if="authError" style="color:#EF4444;font-size:12px;margin-bottom:10px;">{{ authError }}</p>
      <button @click="doAuth" class="btn-primary">{{ authTab==='login'?'登录':'注册' }}</button>
    </div>

    <div style="padding:16px 20px 32px;">
      <div class="community-banner">
        <div class="icon-col">🚀</div>
        <div>
          <h3>共建共享题库，一起搞定考试！</h3>
          <p>有好的题目资源？欢迎上传到题库，让同学们一起受益。有使用建议？我们随时倾听。</p>
          <div class="tags">
            <span class="tag" @click="token=''; page='upload'">📤 上传题库</span>
            <span class="tag" @click="shareApp">🔗 分享给同学</span>
            <span class="tag" @click="showSuggest">💡 提交建议</span>
            <span class="tag" @click="goTuteOfficial">🎓 TUTE专属</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template v-else>
    <div class="school-banner" @click="goTuteOfficial" style="cursor: pointer;">
      <img src="https://cdn.urongda.com//images/normal/medium/tianjin-university-of-technology-and-education-logo-1024px.png" alt="TUTE">
      <div class="school-banner-text">
        <div class="cn">天津职业技术师范大学</div>
        <div class="en">Tianjin University of Technology and Education</div>
      </div>
    </div>

    <div class="app-header">
      <div class="app-header-inner">
        <div class="app-logo" @click="goHome">
          <div class="icon">📚</div>
          <div>
            <div class="name">刷题宝 Pro</div>
            <div class="sub">智能题库平台</div>
          </div>
        </div>
        <div class="header-right">
          <button v-if="currentUser.role==='admin'||currentUser.role==='subadmin'" @click="page='admin'; loadAdminBanks()" class="btn-admin">👑 后台</button>
          <button @click="isDrawerOpen = true; loadMe()" class="btn-menu">☰</button>
        </div>
      </div>
      <div v-if="page==='home'" class="tab-bar">
        <button @click="homeTab='banks'" :class="['tab-btn', homeTab==='banks'?'active':'']">📦 题库</button>
        <button @click="homeTab='wrong'; loadWrong()" :class="['tab-btn', homeTab==='wrong'?'active':'']">❌ 错题本</button>
        <button @click="homeTab='favorites'; loadFavorites()" :class="['tab-btn', homeTab==='favorites'?'active':'']">⭐ 收藏夹</button>
        <button @click="homeTab='community'; loadCommunityPosts()" :class="['tab-btn', homeTab==='community'?'active':'']">💬 动态</button>
        <button @click="homeTab='leaderboard'; loadLeaderboard()" :class="['tab-btn', homeTab==='leaderboard'?'active':'']">🏆 排行</button>
      </div>
    </div>

    <!-- 右侧抽屉 -->
    <div :class="['drawer-overlay', isDrawerOpen?'active':'']" @click="isDrawerOpen=false"></div>

    <!-- 支持作者弹窗 -->
    <div v-if="showSupportModal" class="support-modal-overlay" @click.self="closeSupport">
      <div class="support-modal">
        <h3>☕ 支持作者</h3>
        <div v-if="!supportPayType" class="support-choices">
          <button @click="selectPayType('wechat')" class="support-choice-btn">💚 微信支付</button>
          <button @click="selectPayType('alipay')" class="support-choice-btn">💙 支付宝</button>
        </div>
<!-- 微信 -->
<div v-if="supportPayType === 'wechat'" class="support-qr-card">
    <img src="wechat.jpg" alt="微信收款码">
    <div class="support-qr-label">微信扫码支付</div>
</div>

<!-- 支付宝 -->
<div v-if="supportPayType === 'alipay'" class="support-qr-card">
    <img src="alipay.jpg" alt="支付宝收款码">
    <div class="support-qr-label">支付宝扫码支付</div>
</div>
        <div style="display:flex; gap:8px;">
          <button v-if="supportPayType" @click="supportPayType=''" class="btn-close-modal" style="flex:1;">返回</button>
          <button @click="closeSupport" class="btn-close-modal" style="flex:1;">关闭</button>
        </div>
      </div>
    </div>

    <div :class="['drawer-content', isDrawerOpen?'active':'']">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 15px; font-weight: 800; color: var(--gray-700);">👤 个人中心</span>
        <button @click="isDrawerOpen=false" class="drawer-close">✕</button>
      </div>

      <!-- 暗黑模式切换 -->
      <div class="dark-mode-switch">
        <span class="label">🌙 暗黑模式</span>
        <div :class="['switch-track', isDarkMode?'active':'']" @click="toggleDarkMode">
          <div class="switch-thumb"></div>
        </div>
      </div>

      <div class="stats-hero">
        <div class="user-profile-box">
          <div class="user-avatar-circle">{{ currentUser.avatar || '⚡' }}</div>
          <div class="user-info-text">
            <div class="name-row">
              <span>{{ currentUser.nickname || '同学' }}</span>
              <span class="gender-tag">{{ currentUser.gender || '保密' }}</span>
            </div>
            <div class="email-row">{{ currentUser.email }}</div>
          </div>
        </div>
        <div class="greeting">欢迎回来，今天也要加油刷题呀 👋</div>
        <div class="big-num">{{ meData.stats ? meData.stats.totalAnswered : 0 }}</div>
        <div class="label">累计已答题目</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="num num-green">{{ meData.stats ? meData.stats.totalCorrect : 0 }}</div><div class="lbl">答对题数</div></div>
        <div class="stat-card"><div class="num num-blue">{{ accuracy }}</div><div class="lbl">综合正确率</div></div>
        <div class="stat-card"><div class="num num-red">{{ meData.wrongQuestions ? meData.wrongQuestions.length : 0 }}</div><div class="lbl">错题数</div></div>
        <div class="stat-card"><div class="num num-gold">{{ meData.favorites ? meData.favorites.length : 0 }}</div><div class="lbl">收藏题目</div></div>
      </div>

      <div class="edit-profile-box">
        <div class="edit-title" style="display:flex; justify-content: space-between; align-items: center;">
          <span>📝 修改个人资料</span>
          <button v-if="!isEditingProfile" @click="startEditProfile" style="background:none; border:none; color:var(--blue); font-size:11px; font-weight:700; cursor:pointer;">编辑</button>
        </div>
        <div v-if="isEditingProfile" style="display:flex; flex-direction:column; gap:6px;">
          <input v-model="editForm.nickname" class="form-input" style="padding:6px 10px; font-size:12px;" placeholder="设置昵称">
          <select v-model="editForm.gender" class="form-input" style="padding:6px 10px; font-size:12px; height:32px;">
            <option value="保密">保密</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <input v-model="editForm.avatar" class="form-input" style="padding:6px 10px; font-size:12px;" placeholder="输入单字Emoji头像(如 🎓)">
          <div style="display:flex; gap:6px; margin-top:4px;">
            <button @click="saveProfile" class="btn-primary" style="padding:5px; font-size:11px; margin:0; flex:1;">保存</button>
            <button @click="isEditingProfile=false" class="btn-prev" style="padding:5px; font-size:11px; margin:0; flex:1; border-radius:10px;">取消</button>
          </div>
        </div>
      </div>

      <div class="menu-section-title">⚙️ 功能管理</div>
      <div class="action-list">
        <button @click="clearStats" class="btn-action-item danger"><span>🧹 清除答题统计</span><span>›</span></button>
        <button @click="clearWrongQuestions" class="btn-action-item danger"><span>🗑 清空错题本</span><span>›</span></button>
        <button @click="clearFavoritesAction" class="btn-action-item danger"><span>📌 清空收藏夹</span><span>›</span></button>
      </div>

      <div class="menu-section-title">💝 支持作者</div>
      <div class="action-list" style="margin-bottom: 0;">
        <button @click="openSupport" class="btn-action-item"><span>☕ 请作者喝杯咖啡</span><span>›</span></button>
      </div>

      <div class="menu-section-title">🚀 敬请期待</div>
      <div class="action-list" style="margin-bottom: 24px;">
        <button @click="upcomingFeature" class="btn-action-item disabled"><span>📅 每日备考打卡签到</span><span>🔒</span></button>
        <button @click="upcomingFeature" class="btn-action-item disabled"><span>🔊 考试倒计时悬浮窗</span><span>🔒</span></button>
      </div>

      <button @click="logout" class="btn-primary" style="background: #EF4444; box-shadow: 0 2px 8px rgba(239,68,68,0.25); margin-top: auto;">退出登录</button>
    </div>

    <!-- ===== 首页 ===== -->
    <main v-if="page==='home'">
      <div v-if="homeTab==='banks'">
        <div class="section-header">
          <span class="section-title">📦 云端题库（{{ banks.length }}）</span>
          <button @click="page='upload'" class="btn-upload">+ 上传题库</button>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
          <input v-model="searchQuery" @input="onSearchInput" class="search-input" placeholder="🔍 搜索题库...">
        </div>

        <!-- 标签筛选 -->
        <div v-if="allBankTags.length > 0" class="tag-filter-bar">
          <button @click="activeTagFilter=''" :class="['tag-filter-btn', activeTagFilter===''?'active':'']">全部</button>
          <button v-for="tag in allBankTags" :key="tag" @click="activeTagFilter=tag" :class="['tag-filter-btn', activeTagFilter===tag?'active':'']">{{ tag }}</button>
        </div>

        <div v-for="bank in filteredBanks" :key="bank._id" class="card" @click="openBank(bank)">
          <div class="card-row">
            <div>
              <div class="card-name">{{ bank.bankName }}</div>
              <div class="card-meta">{{ new Date(bank.uploadTime).toLocaleDateString() }} · 上传者：{{ bank.uploaderNickname || '神秘同学' }}</div>
              <div v-if="bank.tags && bank.tags.length" class="bank-tags">
                <span v-for="tag in bank.tags" :key="tag" class="bank-tag">{{ tag }}</span>
              </div>
              <div class="rating-stars">
                <span v-for="s in 5" :key="s" class="rating-star" :class="{filled: s <= Math.round(bank.averageRating || 0)}">★</span>
              </div>
              <div v-if="bank.ratingCount > 0" class="rating-info">{{ bank.averageRating }} 分 ({{ bank.ratingCount }}人评)</div>
            </div>
            <span class="card-arrow">›</span>
          </div>
        </div>
        <div v-if="filteredBanks.length===0 && (searchQuery || activeTagFilter)" class="empty"><div class="emoji">🔍</div><div>没有找到匹配的题库</div></div>
        <div v-if="filteredBanks.length===0 && !searchQuery && !activeTagFilter" class="empty"><div class="emoji">📭</div><div>暂无题库，快去上传第一份吧！</div></div>

        <div class="community-banner" style="margin-top: 24px;">
          <div class="icon-col">🌟</div>
          <div>
            <h3>共建共享题库，一起搞定考试！</h3>
            <p>有好的题目资源？欢迎上传到题库，让同学们一起受益。</p>
            <div class="tags">
              <span class="tag" @click="page='upload'">📤 上传题库</span>
              <span class="tag" @click="shareApp">🔗 分享给同学</span>
              <span class="tag" @click="showSuggest">💡 提交建议</span>
              <span class="tag" @click="goTuteOfficial">🎓 TUTE专属</span>
            </div>
          </div>
        </div>
      </div>

      <div v-if="homeTab==='wrong'">
        <div class="section-header">
          <span class="section-title">❌ 错题本（{{ wrongList.length }}）</span>
        </div>
        <div v-if="wrongList.length > 0">
          <button @click="startWrongPractice" class="btn-practice-wrong">🔄 开始错题重练</button>
        </div>
        <div v-for="(q, i) in wrongList" :key="i" class="q-card">
          <div class="q-card-row">
            <div class="q-title">
              {{ q.title }}
              <span :class="['q-type-tag', getTypeClass(q.type)]">{{ getTypeName(q.type) }}</span>
            </div>
            <span class="q-wrong-badge">错 {{ q.wrongCount }} 次</span>
          </div>
          <div class="q-bank">📚 {{ q.bankName }}</div>
          <div class="q-answer">正确答案：{{ formatAnswer(q) }}</div>
        </div>
        <div v-if="wrongList.length===0" class="empty"><div class="emoji">🎉</div><div>没有错题，继续保持！</div></div>
      </div>

      <div v-if="homeTab==='favorites'">
        <div class="section-header">
          <span class="section-title">⭐ 收藏夹（{{ favoriteList.length }}）</span>
        </div>
        <div v-if="favoriteList.length > 0">
          <button @click="startFavPractice" class="btn-practice-fav">🔄 开始收藏练习</button>
        </div>
        <div v-for="(q, i) in favoriteList" :key="i" class="q-card">
          <div class="q-card-row">
            <div class="q-title">
              {{ q.title }}
              <span :class="['q-type-tag', getTypeClass(q.type)]">{{ getTypeName(q.type) }}</span>
            </div>
          </div>
          <div class="q-bank">📚 {{ q.bankName }}</div>
          <div class="q-answer">正确答案：{{ formatAnswer(q) }}</div>
        </div>
        <div v-if="favoriteList.length===0" class="empty"><div class="emoji">⭐</div><div>还没有收藏题目</div></div>
      </div>

      <!-- ===== 动态/社区页面 ===== -->
      <div v-if="homeTab==='community'">
        <div class="section-header">
          <span class="section-title">💬 动态</span>
        </div>

        <!-- 发布动态 -->
        <div class="post-input-box">
          <textarea v-model="newPostContent" placeholder="分享你的学习心得、备考经验..." maxlength="500" rows="3"></textarea>
          <div class="post-input-actions">
            <span class="char-count">{{ newPostContent.length }} / 500</span>
            <button @click="submitPost" :disabled="!newPostContent.trim()" class="btn-primary" style="width:auto; padding:8px 20px; margin:0; font-size:13px;">发布</button>
          </div>
        </div>

        <!-- 动态列表 -->
        <div v-for="post in communityPosts" :key="post._id" class="post-card">
          <div class="post-header">
            <div class="post-avatar">{{ post.authorAvatar || '⚡' }}</div>
            <div>
              <div class="post-nickname">{{ post.authorNickname || '匿名同学' }}</div>
              <div class="post-time">{{ formatPostTime(post.createdAt) }}</div>
            </div>
          </div>
          <div class="post-content">{{ post.content }}</div>
          <div class="post-actions">
            <button :class="{ liked: post.isLiked }" @click="toggleLike(post)">
              {{ post.isLiked ? '❤️' : '🤍' }} {{ post.likes || 0 }}
            </button>
            <button @click="toggleComments(post._id)">
              💬 {{ (postComments[post._id] || []).length || post.commentCount || 0 }}
            </button>
            <button v-if="post.authorId === adminSelfId" class="delete-btn" @click="deletePost(post._id)">🗑 删除</button>
          </div>

          <!-- 评论区 -->
          <div v-if="showComments[post._id]" class="comments-section">
            <div v-if="(postComments[post._id] || []).length === 0" style="font-size:12px; color:var(--gray-400); text-align:center; padding:8px 0;">暂无评论</div>
            <div v-for="comment in (postComments[post._id] || [])" :key="comment._id" class="comment-item">
              <span class="comment-nickname">{{ comment.authorNickname || '匿名' }}</span>
              <span class="comment-time">{{ formatPostTime(comment.createdAt) }}</span>
              <div class="comment-text">{{ comment.content }}</div>
            </div>
            <div class="comment-input-row">
              <input v-model="commentInputs[post._id]" placeholder="写评论..." @keyup.enter="submitComment(post._id)" maxlength="200">
              <button @click="submitComment(post._id)">发送</button>
            </div>
          </div>
        </div>
        <div v-if="communityPosts.length===0" class="empty"><div class="emoji">💬</div><div>还没有动态，快来发布第一条吧！</div></div>
      </div>

      <!-- ===== 排行榜页面 ===== -->
      <div v-if="homeTab==='leaderboard'">
        <div class="section-header">
          <span class="section-title">🏆 答题量排行榜</span>
        </div>

        <div v-for="(user, index) in leaderboard" :key="user._id" class="leaderboard-card">
          <div :class="['rank-badge', index===0?'gold':index===1?'silver':index===2?'bronze':'normal']">
            <span v-if="index===0">🥇</span>
            <span v-else-if="index===1">🥈</span>
            <span v-else-if="index===2">🥉</span>
            <span v-else>{{ index + 1 }}</span>
          </div>
          <div class="lb-avatar">{{ user.avatar || '⚡' }}</div>
          <div class="lb-info">
            <div class="lb-name">{{ user.nickname || maskEmail(user.email) }}</div>
            <div class="lb-count">累计答题 {{ user.totalAnswered || 0 }} 题</div>
          </div>
        </div>
        <div v-if="leaderboard.length===0" class="empty"><div class="emoji">🏆</div><div>暂无排行数据</div></div>
      </div>
    </main>

    <!-- ===== 选择模式 ===== -->
    <main v-if="page==='selectMode'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回题库</button>
      <div class="bank-info-card">
        <h2>{{ currentBank.bankName }}</h2>
        <p>共 {{ currentBankQuestions.length }} 题 · 上传者：{{ currentBank.uploaderNickname || '神秘同学' }}</p>
        <div class="rating-stars" style="margin-top:8px;">
          <span v-for="s in 5" :key="s" class="rating-star" :class="{filled: s <= Math.round(currentBank.averageRating || 0)}">★</span>
        </div>
        <div v-if="currentBank.ratingCount > 0" class="rating-info">{{ currentBank.averageRating }} 分 ({{ currentBank.ratingCount }}人评)</div>
        <div class="rate-section">
          <span class="rate-label">给这个题库评分：</span>
          <button v-for="s in 5" :key="s" @click="rateBank(s)" class="rate-btn" :style="s <= Math.round(currentBank.averageRating || 0) ? 'color:#F59E0B;border-color:#F59E0B;' : ''">{{ s }}星</button>
        </div>
      </div>
      <div class="limit-bar">
        <div class="limit-label">📊 每次练习题数</div>
        <div class="limit-btns">
          <button v-for="n in [10,20,30,50,'全部']" :key="n" @click="practiceLimit=n" :class="['limit-btn', practiceLimit===n?'active':'']">{{ n }}</button>
        </div>
      </div>
      <div class="mode-card" @click="startPractice('sequential')">
        <span class="mode-icon">📖</span>
        <div><div class="mode-name">顺序练习</div><div class="mode-desc">按题目顺序逐题练习</div></div>
      </div>
      <div class="mode-card" @click="startPractice('random')">
        <span class="mode-icon">🔀</span>
        <div><div class="mode-name">随机练习</div><div class="mode-desc">随机打乱题目顺序，加强记忆</div></div>
      </div>
      <div class="mode-card" @click="startPractice('exam')">
        <span class="mode-icon">📝</span>
        <div><div class="mode-name">模拟考试</div><div class="mode-desc">随机抽取题目，做完后统一显示结果</div></div>
      </div>
      <!-- 考试时长设置 -->
      <div class="exam-duration-bar">
        <div class="exam-duration-label">⏱ 考试时长</div>
        <div class="limit-btns">
          <button v-for="d in [15,30,45,60,90]" :key="d" @click="examDuration=d" :class="['limit-btn', examDuration===d?'active':'']">{{ d }}分钟</button>
        </div>
      </div>
      <!-- 考试题数设置 -->
      <div class="limit-bar" style="margin-top: -4px;">
        <div class="limit-label">📝 考试题数</div>
        <div class="limit-btns">
          <button v-for="n in [10,20,30,50,'全部']" :key="'exam'+n" @click="examLimit=n" :class="['limit-btn', examLimit===n?'active':'']">{{ n }}</button>
        </div>
      </div>
      <div class="mode-card" @click="startPractice('slim')">
        <span class="mode-icon">⚡</span>
        <div><div class="mode-name">精简练习</div><div class="mode-desc">只练还没答对过的题目</div></div>
      </div>
    </main>

    <!-- ===== 练习页面 ===== -->
    <div v-if="page==='practice'" style="flex:1;display:flex;flex-direction:column;">
      <div class="progress-track">
        <div class="progress-fill" :style="{width:(practiceQuestions.length?((practiceStep+1)/practiceQuestions.length*100):0)+'%'}"></div>
      </div>
      <div class="practice-topbar">
        <button @click="exitPractice" class="btn-exit">‹ 退出</button>
        <span style="font-weight:700;">{{ practiceQuestions.length ? practiceStep+1 : 0 }} / {{ practiceQuestions.length }}</span>
        <div class="score-chips">
          <span v-if="practiceMode==='exam'" :class="['exam-timer', examTimeLeft < 60 ? 'warning' : '']">
            ⏱ {{ examTimeDisplay }}
          </span>
          <span class="chip-ok">✅ {{ sessionCorrect }}</span>
          <span class="chip-err">❌ {{ sessionWrong }}</span>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:12px 16px 20px;">
        <div v-if="practiceQuestions.length>0">
          <div class="q-box">
            <div class="q-box-top">
              <span :class="['q-type-badge', currentPQType]">{{ currentPQTypeName }}</span>
              <div style="display:flex;align-items:center;">
                <button @click="reportQuestion" class="btn-report" title="报错">📝</button>
                <button @click="toggleFavorite" class="btn-fav">{{ isFavorited ? '⭐' : '☆' }}</button>
              </div>
            </div>
            <p class="q-text">{{ currentPQ.title }}</p>
          </div>

          <!-- ★ 判断题：显示"对/错"按钮 -->
          <template v-if="currentPQType === 'judge'">
            <div class="judge-btns">
              <button @click="selectJudge('对')"
                :disabled="practiceAnswered"
                :class="['judge-btn', getJudgeClass('对')]">✓ 对</button>
              <button @click="selectJudge('错')"
                :disabled="practiceAnswered"
                :class="['judge-btn', getJudgeClass('错')]">✗ 错</button>
            </div>
            <!-- 模拟考试模式下的判断题 -->
            <div v-if="practiceMode==='exam'" class="judge-btns" style="margin-top:0;">
              <button @click="examSelectJudge('对')"
                :class="['judge-btn', examAnswers[practiceStep]==='对'?'selected-exam':'']">✓ 对</button>
              <button @click="examSelectJudge('错')"
                :class="['judge-btn', examAnswers[practiceStep]==='错'?'selected-exam':'']">✗ 错</button>
            </div>
          </template>

          <!-- ★ 多选题：可多选 -->
          <template v-else-if="currentPQType === 'multiple'">
            <div v-if="practiceMode!=='exam'">
              <button v-for="(opt,key) in currentPQ.options" :key="key"
                @click="toggleMultipleOption(key)"
                :disabled="practiceAnswered"
                :class="['opt-btn', getMultipleOptionClass(key)]">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
              <!-- 多选题确认按钮 -->
              <button v-if="!practiceAnswered && multipleSelected.length > 0"
                @click="confirmMultiple"
                class="btn-next" style="margin-top:4px;">确认提交</button>
            </div>
            <div v-else>
              <button v-for="(opt,key) in currentPQ.options" :key="'e'+key"
                @click="examToggleMultiple(key)"
                :class="['opt-btn', isExamMultipleSelected(key)?'selected-exam':'']">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
          </template>

          <!-- ★ 单选题 -->
          <template v-else>
            <div v-if="practiceMode!=='exam'">
              <button v-for="(opt,key) in currentPQ.options" :key="key"
                @click="selectOption(key)"
                :disabled="practiceAnswered"
                :class="['opt-btn', getPracticeOptionClass(key)]">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
            <div v-else>
              <button v-for="(opt,key) in currentPQ.options" :key="'e'+key"
                @click="examSelectOption(key)"
                :class="['opt-btn', examAnswers[practiceStep]===key?'selected-exam':'']">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
          </template>

          <!-- 反馈区域（非考试模式） -->
          <div v-if="practiceAnswered && practiceMode!=='exam'" class="feedback-box">
            <div :class="practiceIsCorrect ? 'feedback-correct' : 'feedback-wrong'">
              {{ practiceIsCorrect ? '🎉 回答正确！' : '❌ 回答错误' }}
            </div>
            <div class="feedback-ans">正确答案：<b>{{ formatPracticeAnswer(currentPQ) }}</b></div>
          </div>

          <!-- 问AI解析按钮（非考试模式，已答题时显示） -->
          <button v-if="practiceAnswered && practiceMode!=='exam' && !aiExplanation" @click="askAI" :disabled="aiLoading" class="ai-explain-btn">
            {{ aiLoading ? '⏳ AI 正在解析...' : '💡 问AI解析' }}
          </button>

          <!-- AI解析结果卡片 -->
          <div v-if="aiExplanation" class="ai-explain-card">
            <div style="font-weight:700; margin-bottom:6px; color:var(--blue);">💡 AI 解析</div>
            {{ aiExplanation }}
          </div>
        </div>
      </div>
      <div class="practice-footer">
        <button v-if="practiceMode!=='exam'" @click="prevQuestion" :disabled="practiceStep===0" class="btn-prev">上一题</button>
        <button v-if="practiceMode!=='exam'" @click="nextQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '完成 ✓' : '下一题 →' }}</button>
        <button v-if="practiceMode==='exam'" @click="prevQuestion" :disabled="practiceStep===0" class="btn-prev">上一题</button>
        <button v-if="practiceMode==='exam'" @click="nextExamQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '交卷 ✓' : '下一题 →' }}</button>
      </div>
    </div>

    <!-- ===== 考试结果 ===== -->
    <main v-if="page==='examResult'" style="overflow-y:auto;flex:1;padding-bottom:40px;">
      <div class="result-hero">
        <div class="result-emoji">{{ examScoreEmoji }}</div>
        <div class="result-score">{{ examScore }}<span style="font-size:20px;color:#94A3B8;">分</span></div>
        <div class="result-sub">{{ examCorrectCount }} / {{ examQuestions.length }} 题正确</div>
        <div :class="['result-pass-badge', examScore >= 60 ? 'pass' : 'fail']">
          {{ examScore >= 60 ? '🎉 考试合格！' : '😢 考试不合格，继续加油！' }}
        </div>
      </div>
      <div style="padding:0 16px;">
        <div v-for="(q,i) in examQuestions" :key="i" :class="['result-item', isExamCorrect(q,i)?'ok':'bad']">
          <div :class="isExamCorrect(q,i)?'result-badge-ok':'result-badge-bad'">{{ isExamCorrect(q,i) ? '✓ 正确' : '✗ 错误' }}</div>
          <div class="result-q">{{ q.title }}</div>
          <div v-if="!isExamCorrect(q,i)" class="result-your">你的答案：{{ examAnswers[i]||'未作答' }}</div>
          <div class="result-right">正确答案：{{ formatExamAnswer(q) }}</div>
        </div>
        <button @click="goHome" class="btn-primary" style="margin-top:16px;">返回首页</button>
      </div>
    </main>

    <!-- ===== 上传题库 ===== -->
    <main v-if="page==='upload'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回</button>
      <div class="upload-card">
        <div class="upload-title">📤 上传新题库</div>
        <div class="form-group">
          <input v-model="uploadForm.bankName" class="form-input" placeholder="题库名称（例：第三章综合题）">
        </div>
        <div class="form-group">
          <input v-model="uploadTagsText" class="form-input" placeholder="标签（用逗号分隔，如：高数,期末,第三章）">
        </div>
        <div class="form-group">
          <textarea v-model="uploadForm.text" class="form-textarea" rows="12"
            placeholder="把题目和答案全选复制粘贴到这里...&#10;&#10;支持多种格式，AI 会自动识别提取单选题、多选题和判断题。"></textarea>
        </div>
        <p class="upload-hint">💡 管理员上传直接公开，普通用户上传需审核后发布</p>
        <button @click="submitUpload" :disabled="uploading" class="btn-primary">
          {{ uploading ? '⏳ 提交中...' : '🤖 开始 AI 智能导入' }}
        </button>
        <div v-if="uploadMsg" :class="['upload-msg', uploadMsgClass]" style="margin-top:10px;">{{ uploadMsg }}</div>
        <!-- 异步解析进度 -->
        <div v-if="uploadPolling" class="upload-progress">
          <div class="upload-progress-bar"><div class="upload-progress-fill"></div></div>
          <div class="upload-progress-text">🤖 AI 正在后台解析题目，请耐心等待...</div>
        </div>
      </div>
    </main>

    <!-- ===== 管理后台 ===== -->
    <main v-if="page==='admin'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回</button>
      <div style="font-size:16px;font-weight:800;margin-bottom:14px;">👑 管理后台</div>
      <div class="tab-bar" style="border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--gray-100);">
        <button @click="adminTab='banks'; loadAdminBanks()" :class="['tab-btn', adminTab==='banks'?'active':'']">题库管理</button>
        <button @click="adminTab='users'; loadAdminUsers()" :class="['tab-btn', adminTab==='users'?'active':'']">用户管理</button>
        <button @click="adminTab='reports'; loadAdminReports()" :class="['tab-btn', adminTab==='reports'?'active':'']">报错管理</button>
      </div>

      <div v-if="adminTab==='banks'">
        <div v-for="bank in adminBanks" :key="bank._id" class="admin-bank-card">
          <div class="admin-bank-row">
            <div>
              <div style="font-size:14px;font-weight:600;">{{ bank.bankName }}
                <span style="font-size:11px;color:var(--gray-400);margin-left:6px;">{{ bank.questions ? bank.questions.length : 0 }}题</span>
              </div>
              <div style="font-size:11px;color:var(--gray-400);margin-top:2px;">
                上传者：{{ bank.uploaderNickname || maskEmail(bank.uploadedBy) || '神秘同学' }}
              </div>
            </div>
            <button @click="toggleBankStatus(bank)" :class="bank.isPublic?'btn-toggle-on':'btn-toggle-off'">
              {{ bank.isPublic ? '公开中' : '已隐藏' }}
            </button>
          </div>
          <div style="display:flex;gap:8px;">
            <button @click="deleteBank(bank._id, bank.bankName)" class="btn-del">🗑 删除题库</button>
          </div>
        </div>
        <div v-if="adminBanks.length===0" class="empty"><div class="emoji">📭</div><div>暂无题库数据</div></div>
      </div>

      <div v-if="adminTab==='users'">
        <div v-for="user in adminUsers" :key="user._id" class="admin-user-card">
          <div>
            <div class="user-name">
              {{ user.nickname || maskEmail(user.email) }}
              <span v-if="user.role==='admin'" style="color:var(--gold);font-size:12px;">👑 管理员</span>
              <span v-if="user.role==='subadmin'" class="subadmin-tag">🛡️ 副管理员</span>
            </div>
            <div class="user-date">注册：{{ new Date(user.createdAt).toLocaleDateString() }}</div>
          </div>
          <div v-if="user._id !== adminSelfId" style="display:flex;gap:6px;flex-wrap:wrap;">
            <button v-if="currentUser.role==='admin' && user.role==='admin'" @click="toggleRole(user, 'subadmin')" class="btn-role">降为副管</button>
            <button v-if="currentUser.role==='admin' && user.role==='subadmin'" @click="toggleRole(user, 'admin')" class="btn-role">升为管理员</button>
            <button v-if="currentUser.role==='admin' && (user.role==='admin' || user.role==='subadmin')" @click="toggleRole(user, 'user')" class="btn-role">降为普通</button>
            <button v-if="currentUser.role==='admin' && user.role==='user'" @click="toggleRole(user, 'admin')" class="btn-role">升为管理员</button>
            <button v-if="currentUser.role==='subadmin' && user.role==='subadmin'" @click="toggleRole(user, 'user')" class="btn-role">降为普通</button>
            <button v-if="currentUser.role==='subadmin' && user.role==='user'" @click="toggleRole(user, 'subadmin')" class="btn-role">升为副管</button>
            <button @click="deleteUser(user._id)" class="btn-del-user">删除</button>
          </div>
        </div>
        <div v-if="adminUsers.length===0" class="empty"><div class="emoji">👥</div><div>暂无用户</div></div>
      </div>

      <div v-if="adminTab==='reports'">
        <div v-for="report in adminReports" :key="report._id" class="report-card">
          <div class="report-q">{{ report.questionTitle || '未知题目' }}</div>
          <div class="report-reason">报错原因：{{ report.reason }}</div>
          <div class="report-meta">
            <span>报错人：{{ report.reporterNickname || '未知用户' }} · {{ new Date(report.createdAt).toLocaleString() }}</span>
            <button @click="resolveReport(report)" :disabled="report.resolved" :class="'btn-resolved'">
              {{ report.resolved ? '已处理' : '标记已处理' }}
            </button>
          </div>
        </div>
        <div v-if="adminReports.length===0" class="empty"><div class="emoji">✅</div><div>暂无报错记录</div></div>
      </div>
    </main>
  </template>

</div>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;
const API = 'https://quiz-server-ulpb.onrender.com/api';

createApp({
  setup() {
    const token = ref(localStorage.getItem('quiz_token') || '');
    const practiceLimit = ref(20);
    const examLimit = ref(20);
    const currentUser = ref(JSON.parse(localStorage.getItem('quiz_user') || '{}'));
    const authTab = ref('login');
    const authForm = ref({ email: '', password: '' });
    const authError = ref('');
    const code = ref('');
    const countdown = ref(0);
    const isDrawerOpen = ref(false);
    const isEditingProfile = ref(false);
    const editForm = ref({ nickname: '', gender: '保密', avatar: '⚡' });

    // ===== 支持作者弹窗 =====
    const showSupportModal = ref(false);
    const supportPayType = ref('');
    const openSupport = () => { showSupportModal.value = true; supportPayType.value = ''; };
    const closeSupport = () => { showSupportModal.value = false; supportPayType.value = ''; };
    const selectPayType = (type) => { supportPayType.value = type; };

    // ===== 暗黑模式 =====
    const isDarkMode = ref(localStorage.getItem('quiz_dark_mode') === 'true');

    const applyDarkMode = (dark) => {
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    };

    const toggleDarkMode = () => {
      isDarkMode.value = !isDarkMode.value;
      localStorage.setItem('quiz_dark_mode', isDarkMode.value);
      applyDarkMode(isDarkMode.value);
    };

    // 初始化暗黑模式
    applyDarkMode(isDarkMode.value);

    // ★★★ 修复：清空答题统计 — 真正调用后端接口 ★★★
    const clearStats = async () => {
      if (!confirm('⚠️ 警告：确定要清空您在云端的所有做题数量和正确率统计吗？该操作不可逆！')) return;
      const r = await api('/user/clear-stats', { method: 'POST' });
      if (r.success) {
        alert('答题统计重置成功！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    // ★★★ 修复：清空错题本 — 真正调用后端接口 ★★★
    const clearWrongQuestions = async () => {
      if (!confirm('⚠️ 确定要一键清空您的错题本吗？')) return;
      const r = await api('/wrong-questions/clear', { method: 'POST', body: JSON.stringify({ all: true }) });
      if (r.success) {
        wrongList.value = [];
        alert('错题本已成功清空！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    // ★★★ 修复：清空收藏夹 — 真正调用后端接口 ★★★
    const clearFavoritesAction = async () => {
      if (!confirm('⚠️ 确定要清空您收藏的所有题目吗？')) return;
      const r = await api('/favorites/clear', { method: 'POST', body: JSON.stringify({ all: true }) });
      if (r.success) {
        favoriteList.value = [];
        alert('收藏夹已清空！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    const upcomingFeature = () => { alert('🚀 正在紧锣密鼓开发中，下一迭代版本即将公开，敬请期待！'); };

    const startEditProfile = () => {
      isEditingProfile.value = true;
      editForm.value = {
        nickname: currentUser.value.nickname || '',
        gender: currentUser.value.gender || '保密',
        avatar: currentUser.value.avatar || '⚡'
      };
    };

    const saveProfile = async () => {
      const r = await api('/user/profile', { method: 'PUT', body: JSON.stringify(editForm.value) });
      if (r.success) {
        currentUser.value = { ...currentUser.value, ...editForm.value };
        localStorage.setItem('quiz_user', JSON.stringify(currentUser.value));
        isEditingProfile.value = false;
        alert('资料保存成功！');
        await loadMe();
      } else {
        alert('保存失败：' + (r.error || '未知错误'));
      }
    };

    const api = async (path, options = {}) => {
      try {
        const res = await fetch(API + path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token.value,
            ...(options.headers || {})
          }
        });
        return res.json();
      } catch(e) {
        return { success: false, error: '网络异常' };
      }
    };

    const sendCode = async () => {
      if (!authForm.value.email) { alert('请先填写邮箱'); return; }
      if (countdown.value > 0) return;
      countdown.value = 60;
      const timer = setInterval(() => { countdown.value--; if (countdown.value <= 0) clearInterval(timer); }, 1000);

      // 前端生成验证码
      const codeVal = Math.floor(100000 + Math.random() * 900000).toString();

      try {
        // 用 EmailJS 直接发邮件（不经过后端，绕过 Render SMTP 限制）
        await emailjs.send('service_1516439173', 'template_1516439173', {
          to_email: authForm.value.email,
          code: codeVal
        }, 'jjS_Cb3bznEgenFdw');
        alert('验证码已发送！');
      } catch(e) {
        alert('验证码发送失败：' + (e.text || e.message || '未知错误'));
        countdown.value = 0;
        return;
      }

      // 把验证码发给后端存储（后端只存储，不发邮件）
      await fetch(API + '/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: authForm.value.email, code: codeVal })
      });
    };

    const doAuth = async () => {
      authError.value = '';
      if (!authForm.value.email || !authForm.value.password) { authError.value = '请填写邮箱和密码'; return; }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(authForm.value.email)) { authError.value = '请输入有效的邮箱地址'; return; }
      const payload = { ...authForm.value };
      if (authTab.value === 'register') payload.code = code.value;
      const result = await api(`/${authTab.value}`, { method: 'POST', body: JSON.stringify(payload) });
      if (result.success) {
        token.value = result.token;
        currentUser.value = result.user || { email: authForm.value.email, role: 'user' };
        localStorage.setItem('quiz_token', result.token);
        localStorage.setItem('quiz_user', JSON.stringify(currentUser.value));
        authForm.value = { email: '', password: '' };
        code.value = '';
        fetchBanks(); loadMe();
      } else { authError.value = result.error; }
    };

    const logout = () => {
      token.value = ''; currentUser.value = {}; meData.value = {};
      wrongList.value = []; favoriteList.value = [];
      page.value = 'home'; homeTab.value = 'banks'; isDrawerOpen.value = false; isEditingProfile.value = false;
      localStorage.removeItem('quiz_token'); localStorage.removeItem('quiz_user');
    };

    const goTuteOfficial = () => { window.open('https://www.tute.edu.cn', '_blank'); };
    const shareApp = () => {
      const shareUrl = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl).then(() => alert('🚀 链接已复制到剪贴板，快分享给天职师大的同学们吧！')).catch(() => alert('分享链接为：' + shareUrl));
      } else { alert('分享链接为：' + shareUrl); }
    };
    const showSuggest = () => { const s = prompt('💡 请输入你的建议（将通过邮件反馈给管理员）：'); if (s && s.trim()) alert('感谢你的建议！我们会认真考虑 🙏'); };

    const page = ref('home');
    const homeTab = ref('banks');
    const banks = ref([]);
    const meData = ref({});
    const wrongList = ref([]);
    const favoriteList = ref([]);

    // ===== 题库搜索 =====
    const searchQuery = ref('');
    let searchDebounceTimer = null;

    const onSearchInput = () => {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        fetchBanks(searchQuery.value);
      }, 300);
    };

    // ===== 题库标签筛选 =====
    const activeTagFilter = ref('');

    const allBankTags = computed(() => {
      const tagSet = new Set();
      banks.value.forEach(bank => {
        if (bank.tags && Array.isArray(bank.tags)) {
          bank.tags.forEach(tag => tagSet.add(tag));
        }
      });
      return Array.from(tagSet);
    });

    const filteredBanks = computed(() => {
      let result = banks.value;
      if (activeTagFilter.value) {
        result = result.filter(bank => bank.tags && Array.isArray(bank.tags) && bank.tags.includes(activeTagFilter.value));
      }
      return result;
    });

    const accuracy = computed(() => {
      if (!meData.value.stats || meData.value.stats.totalAnswered === 0) return '0%';
      return Math.round(meData.value.stats.totalCorrect / meData.value.stats.totalAnswered * 100) + '%';
    });

    const fetchBanks = async (query) => {
      let url = '/get-banks-list';
      if (query && query.trim()) {
        url += '?query=' + encodeURIComponent(query.trim());
      }
      const r = await api(url);
      if (r.success) banks.value = r.data;
    };
