    <div :class="['drawer-content', isDrawerOpen?'active':'']">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 15px; font-weight: 800; color: var(--gray-700);">👤 个人中心</span>
        <button @click="isDrawerOpen=false" class="drawer-close">✕</button>
      </div>

      <!-- 暗黑模式切换 -->
      <div class="dark-mode-switch">
        <span class="label">🌙 暗黑模式</span>
        <div :class="['switch-track', isDarkMode?'active':'']" @click="toggleDarkMode">
          <div class="switch-thumb"></div>
        </div>
      </div>

      <div class="stats-hero">
        <div class="user-profile-box">
          <div class="user-avatar-circle">{{ currentUser.avatar || '⚡' }}</div>
          <div class="user-info-text">
            <div class="name-row">
              <span>{{ currentUser.nickname || '同学' }}</span>
              <span class="gender-tag">{{ currentUser.gender || '保密' }}</span>
            </div>
            <div class="email-row">{{ currentUser.email }}</div>
          </div>
        </div>
        <div class="greeting">欢迎回来，今天也要加油刷题呀 👋</div>
        <div class="big-num">{{ meData.stats ? meData.stats.totalAnswered : 0 }}</div>
        <div class="label">累计已答题目</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="num num-green">{{ meData.stats ? meData.stats.totalCorrect : 0 }}</div><div class="lbl">答对题数</div></div>
        <div class="stat-card"><div class="num num-blue">{{ accuracy }}</div><div class="lbl">综合正确率</div></div>
        <div class="stat-card"><div class="num num-red">{{ meData.wrongQuestions ? meData.wrongQuestions.length : 0 }}</div><div class="lbl">错题数</div></div>
        <div class="stat-card"><div class="num num-gold">{{ meData.favorites ? meData.favorites.length : 0 }}</div><div class="lbl">收藏题目</div></div>
      </div>

      <div class="edit-profile-box">
        <div class="edit-title" style="display:flex; justify-content: space-between; align-items: center;">
          <span>📝 修改个人资料</span>
          <button v-if="!isEditingProfile" @click="startEditProfile" style="background:none; border:none; color:var(--blue); font-size:11px; font-weight:700; cursor:pointer;">编辑</button>
        </div>
        <div v-if="isEditingProfile" style="display:flex; flex-direction:column; gap:6px;">
          <input v-model="editForm.nickname" class="form-input" style="padding:6px 10px; font-size:12px;" placeholder="设置昵称">
          <select v-model="editForm.gender" class="form-input" style="padding:6px 10px; font-size:12px; height:32px;">
            <option value="保密">保密</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
          <input v-model="editForm.avatar" class="form-input" style="padding:6px 10px; font-size:12px;" placeholder="输入单字Emoji头像(如 🎓)">
          <div style="display:flex; gap:6px; margin-top:4px;">
            <button @click="saveProfile" class="btn-primary" style="padding:5px; font-size:11px; margin:0; flex:1;">保存</button>
            <button @click="isEditingProfile=false" class="btn-prev" style="padding:5px; font-size:11px; margin:0; flex:1; border-radius:10px;">取消</button>
          </div>
        </div>
      </div>

      <div class="menu-section-title">⚙️ 功能管理</div>
      <div class="action-list">
        <button @click="clearStats" class="btn-action-item danger"><span>🧹 清除答题统计</span><span>›</span></button>
        <button @click="clearWrongQuestions" class="btn-action-item danger"><span>🗑 清空错题本</span><span>›</span></button>
        <button @click="clearFavoritesAction" class="btn-action-item danger"><span>📌 清空收藏夹</span><span>›</span></button>
      </div>

      <div class="menu-section-title">💝 支持作者</div>
      <div class="action-list" style="margin-bottom: 0;">
        <button @click="openSupport" class="btn-action-item"><span>☕ 请作者喝杯咖啡</span><span>›</span></button>
      </div>

      <div class="menu-section-title">🚀 敬请期待</div>
      <div class="action-list" style="margin-bottom: 24px;">
        <button @click="upcomingFeature" class="btn-action-item disabled"><span>📅 每日备考打卡签到</span><span>🔒</span></button>
        <button @click="upcomingFeature" class="btn-action-item disabled"><span>🔊 考试倒计时悬浮窗</span><span>🔒</span></button>
      </div>

      <button @click="logout" class="btn-primary" style="background: #EF4444; box-shadow: 0 2px 8px rgba(239,68,68,0.25); margin-top: auto;">退出登录</button>
    </div>

    <!-- ===== 首页 ===== -->
    <main v-if="page==='home'">
      <div v-if="homeTab==='banks'">
        <div class="section-header">
          <span class="section-title">📦 云端题库（{{ banks.length }}）</span>
          <button @click="page='upload'" class="btn-upload">+ 上传题库</button>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
          <input v-model="searchQuery" @input="onSearchInput" class="search-input" placeholder="🔍 搜索题库...">
        </div>

        <!-- 标签筛选 -->
        <div v-if="allBankTags.length > 0" class="tag-filter-bar">
          <button @click="activeTagFilter=''" :class="['tag-filter-btn', activeTagFilter===''?'active':'']">全部</button>
          <button v-for="tag in allBankTags" :key="tag" @click="activeTagFilter=tag" :class="['tag-filter-btn', activeTagFilter===tag?'active':'']">{{ tag }}</button>
        </div>

        <div v-for="bank in filteredBanks" :key="bank._id" class="card" @click="openBank(bank)">
          <div class="card-row">
            <div>
              <div class="card-name">{{ bank.bankName }} <span style="font-size:11px;padding:1px 6px;border-radius:4px;margin-left:4px;" :style="bank.bankType==='cloze'?'background:#F3E8FF;color:#7C3AED;':bank.bankType==='recite'?'background:#F0FDF4;color:#16A34A;':'background:var(--blue-lt);color:var(--blue);'">{{ bank.bankType==='cloze'?'完形':bank.bankType==='recite'?'背诵':'选择' }}</span></div>
              <div class="card-meta">{{ new Date(bank.uploadTime).toLocaleDateString() }} · 上传者：{{ bank.uploaderNickname || '神秘同学' }}</div>
              <div v-if="bank.tags && bank.tags.length" class="bank-tags">
                <span v-for="tag in bank.tags" :key="tag" class="bank-tag">{{ tag }}</span>
              </div>
              <div class="rating-stars">
                <span v-for="s in 5" :key="s" class="rating-star" :class="{filled: s <= Math.round(bank.averageRating || 0)}">★</span>
              </div>
              <div v-if="bank.ratingCount > 0" class="rating-info">{{ bank.averageRating }} 分 ({{ bank.ratingCount }}人评)</div>
            </div>
            <span class="card-arrow">›</span>
          </div>
        </div>
        <div v-if="filteredBanks.length===0 && (searchQuery || activeTagFilter)" class="empty"><div class="emoji">🔍</div><div>没有找到匹配的题库</div></div>
        <div v-if="filteredBanks.length===0 && !searchQuery && !activeTagFilter" class="empty"><div class="emoji">📭</div><div>暂无题库，快去上传第一份吧！</div></div>

        <div class="community-banner" style="margin-top: 24px;">
          <div class="icon-col">🌟</div>
          <div>
            <h3>共建共享题库，一起搞定考试！</h3>
            <p>有好的题目资源？欢迎上传到题库，让同学们一起受益。</p>
            <div class="tags">
              <span class="tag" @click="page='upload'">📤 上传题库</span>
              <span class="tag" @click="shareApp">🔗 分享给同学</span>
              <span class="tag" @click="showSuggest">💡 提交建议</span>
              <span class="tag" @click="goTuteOfficial">🎓 TUTE专属</span>
            </div>
          </div>
        </div>
      </div>

      <div v-if="homeTab==='wrong'">
        <div class="section-header">
          <span class="section-title">❌ 错题本（{{ wrongList.length }}）</span>
        </div>
        <div v-if="wrongList.length > 0">
          <button @click="startWrongPractice" class="btn-practice-wrong">🔄 开始错题重练</button>
        </div>
        <div v-for="(q, i) in wrongList" :key="i" class="q-card">
          <div class="q-card-row">
            <div class="q-title">
              {{ q.title }}
              <span :class="['q-type-tag', getTypeClass(q.type)]">{{ getTypeName(q.type) }}</span>
            </div>
            <span class="q-wrong-badge">错 {{ q.wrongCount }} 次</span>
          </div>
          <div class="q-bank">📚 {{ q.bankName }}</div>
          <div class="q-answer">正确答案：{{ formatAnswer(q) }}</div>
        </div>
        <div v-if="wrongList.length===0" class="empty"><div class="emoji">🎉</div><div>没有错题，继续保持！</div></div>
      </div>

      <div v-if="homeTab==='favorites'">
        <div class="section-header">
          <span class="section-title">⭐ 收藏夹（{{ favoriteList.length }}）</span>
        </div>
        <div v-if="favoriteList.length > 0">
          <button @click="startFavPractice" class="btn-practice-fav">🔄 开始收藏练习</button>
        </div>
        <div v-for="(q, i) in favoriteList" :key="i" class="q-card">
          <div class="q-card-row">
            <div class="q-title">
              {{ q.title }}
              <span :class="['q-type-tag', getTypeClass(q.type)]">{{ getTypeName(q.type) }}</span>
            </div>
          </div>
          <div class="q-bank">📚 {{ q.bankName }}</div>
          <div class="q-answer">正确答案：{{ formatAnswer(q) }}</div>
        </div>
        <div v-if="favoriteList.length===0" class="empty"><div class="emoji">⭐</div><div>还没有收藏题目</div></div>
      </div>

      <!-- ===== 动态/社区页面 ===== -->
      <div v-if="homeTab==='community'">
        <div class="section-header">
          <span class="section-title">💬 动态</span>
        </div>

        <!-- 发布动态 -->
        <div class="post-input-box">
          <textarea v-model="newPostContent" placeholder="分享你的学习心得、备考经验..." maxlength="500" rows="3"></textarea>
          <div class="post-input-actions">
            <span class="char-count">{{ newPostContent.length }} / 500</span>
            <button @click="submitPost" :disabled="!newPostContent.trim()" class="btn-primary" style="width:auto; padding:8px 20px; margin:0; font-size:13px;">发布</button>
          </div>
        </div>

        <!-- 动态列表 -->
        <div v-for="post in communityPosts" :key="post._id" class="post-card">
          <div class="post-header">
            <div class="post-avatar">{{ post.authorAvatar || '⚡' }}</div>
            <div>
              <div class="post-nickname">{{ post.authorNickname || '匿名同学' }}</div>
              <div class="post-time">{{ formatPostTime(post.createdAt) }}</div>
            </div>
          </div>
          <div class="post-content">{{ post.content }}</div>
          <div class="post-actions">
            <button :class="{ liked: post.isLiked }" @click="toggleLike(post)">
              {{ post.isLiked ? '❤️' : '🤍' }} {{ post.likes || 0 }}
            </button>
            <button @click="toggleComments(post._id)">
              💬 {{ (postComments[post._id] || []).length || post.commentCount || 0 }}
            </button>
            <button v-if="post.authorId === adminSelfId" class="delete-btn" @click="deletePost(post._id)">🗑 删除</button>
          </div>

          <!-- 评论区 -->
          <div v-if="showComments[post._id]" class="comments-section">
            <div v-if="(postComments[post._id] || []).length === 0" style="font-size:12px; color:var(--gray-400); text-align:center; padding:8px 0;">暂无评论</div>
            <div v-for="comment in (postComments[post._id] || [])" :key="comment._id" class="comment-item">
              <span class="comment-nickname">{{ comment.authorNickname || '匿名' }}</span>
              <span class="comment-time">{{ formatPostTime(comment.createdAt) }}</span>
              <div class="comment-text">{{ comment.content }}</div>
            </div>
            <div class="comment-input-row">
              <input v-model="commentInputs[post._id]" placeholder="写评论..." @keyup.enter="submitComment(post._id)" maxlength="200">
              <button @click="submitComment(post._id)">发送</button>
            </div>
          </div>
        </div>
        <div v-if="communityPosts.length===0" class="empty"><div class="emoji">💬</div><div>还没有动态，快来发布第一条吧！</div></div>
      </div>

      <!-- ===== 排行榜页面 ===== -->
      <div v-if="homeTab==='leaderboard'">
        <div class="section-header">
          <span class="section-title">🏆 答题量排行榜</span>
        </div>

        <div v-for="(user, index) in leaderboard" :key="user._id" class="leaderboard-card">
          <div :class="['rank-badge', index===0?'gold':index===1?'silver':index===2?'bronze':'normal']">
            <span v-if="index===0">🥇</span>
            <span v-else-if="index===1">🥈</span>
            <span v-else-if="index===2">🥉</span>
            <span v-else>{{ index + 1 }}</span>
          </div>
          <div class="lb-avatar">{{ user.avatar || '⚡' }}</div>
          <div class="lb-info">
            <div class="lb-name">{{ user.nickname || maskEmail(user.email) }}</div>
            <div class="lb-count">累计答题 {{ user.totalAnswered || 0 }} 题</div>
          </div>
        </div>
        <div v-if="leaderboard.length===0" class="empty"><div class="emoji">🏆</div><div>暂无排行数据</div></div>
      </div>
    </main>

    <!-- ===== 选择模式 ===== -->
    <main v-if="page==='selectMode'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回题库</button>
      <div class="bank-info-card">
        <h2>{{ currentBank.bankName }}</h2>
        <p>共 {{ currentBankQuestions.length }} 题 · 上传者：{{ currentBank.uploaderNickname || '神秘同学' }}</p>
        <div class="rating-stars" style="margin-top:8px;">
          <span v-for="s in 5" :key="s" class="rating-star" :class="{filled: s <= Math.round(currentBank.averageRating || 0)}">★</span>
        </div>
        <div v-if="currentBank.ratingCount > 0" class="rating-info">{{ currentBank.averageRating }} 分 ({{ currentBank.ratingCount }}人评)</div>
        <div class="rate-section">
          <span class="rate-label">给这个题库评分：</span>
          <button v-for="s in 5" :key="s" @click="rateBank(s)" class="rate-btn" :style="s <= Math.round(currentBank.averageRating || 0) ? 'color:#F59E0B;border-color:#F59E0B;' : ''">{{ s }}星</button>
        </div>
      </div>
      <div class="limit-bar">
        <div class="limit-label">📊 每次练习题数</div>
        <div class="limit-btns">
          <button v-for="n in [10,20,30,50,'全部']" :key="n" @click="practiceLimit=n" :class="['limit-btn', practiceLimit===n?'active':'']">{{ n }}</button>
        </div>
      </div>
      <div class="mode-card" @click="startPractice('sequential')">
        <span class="mode-icon">📖</span>
        <div><div class="mode-name">顺序练习</div><div class="mode-desc">按题目顺序逐题练习</div></div>
      </div>
      <div class="mode-card" @click="startPractice('random')">
        <span class="mode-icon">🔀</span>
        <div><div class="mode-name">随机练习</div><div class="mode-desc">随机打乱题目顺序，加强记忆</div></div>
      </div>
      <div class="mode-card" @click="startPractice('exam')">
        <span class="mode-icon">📝</span>
        <div><div class="mode-name">模拟考试</div><div class="mode-desc">随机抽取题目，做完后统一显示结果</div></div>
      </div>
      <!-- 考试时长设置 -->
      <div class="exam-duration-bar">
        <div class="exam-duration-label">⏱ 考试时长</div>
        <div class="limit-btns">
          <button v-for="d in [15,30,45,60,90]" :key="d" @click="examDuration=d" :class="['limit-btn', examDuration===d?'active':'']">{{ d }}分钟</button>
        </div>
      </div>
      <!-- 考试题数设置 -->
      <div class="limit-bar" style="margin-top: -4px;">
        <div class="limit-label">📝 考试题数</div>
        <div class="limit-btns">
          <button v-for="n in [10,20,30,50,'全部']" :key="'exam'+n" @click="examLimit=n" :class="['limit-btn', examLimit===n?'active':'']">{{ n }}</button>
        </div>
      </div>
      <div class="mode-card" @click="startPractice('slim')">
        <span class="mode-icon">⚡</span>
        <div><div class="mode-name">精简练习</div><div class="mode-desc">只练还没答对过的题目</div></div>
      </div>
    </main>

    <!-- ===== 练习页面 ===== -->
    <div v-if="page==='practice'" style="flex:1;display:flex;flex-direction:column;">
      <div class="progress-track">
        <div class="progress-fill" :style="{width:(practiceQuestions.length?((practiceStep+1)/practiceQuestions.length*100):0)+'%'}"></div>
      </div>
      <div class="practice-topbar">
        <button @click="exitPractice" class="btn-exit">‹ 退出</button>
        <span style="font-weight:700;">{{ practiceQuestions.length ? practiceStep+1 : 0 }} / {{ practiceQuestions.length }}</span>
        <div class="score-chips">
          <span v-if="practiceMode==='exam'" :class="['exam-timer', examTimeLeft < 60 ? 'warning' : '']">
            ⏱ {{ examTimeDisplay }}
          </span>
          <span class="chip-ok">✅ {{ sessionCorrect }}</span>
          <span class="chip-err">❌ {{ sessionWrong }}</span>
        </div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:12px 16px 20px;">
        <div v-if="practiceQuestions.length>0">
          <!-- 默认题目卡片（选择题/判断题/多选题显示） -->
          <div v-if="currentPQType !== 'cloze' && currentPQType !== 'recite'" class="q-box">
            <div class="q-box-top">
              <span :class="['q-type-badge', currentPQType]">{{ currentPQTypeName }}</span>
              <div style="display:flex;align-items:center;">
                <button @click="reportQuestion" class="btn-report" title="报错">📝</button>
                <button @click="toggleFavorite" class="btn-fav">{{ isFavorited ? '⭐' : '☆' }}</button>
              </div>
            </div>
            <p class="q-text">{{ currentPQ.title }}</p>
          </div>

          <!-- ★ 判断题：显示"对/错"按钮 -->
          <template v-if="currentPQType === 'judge'">
            <div class="judge-btns">
              <button @click="selectJudge('对')"
                :disabled="practiceAnswered"
                :class="['judge-btn', getJudgeClass('对')]">✓ 对</button>
              <button @click="selectJudge('错')"
                :disabled="practiceAnswered"
                :class="['judge-btn', getJudgeClass('错')]">✗ 错</button>
            </div>
            <!-- 模拟考试模式下的判断题 -->
            <div v-if="practiceMode==='exam'" class="judge-btns" style="margin-top:0;">
              <button @click="examSelectJudge('对')"
                :class="['judge-btn', examAnswers[practiceStep]==='对'?'selected-exam':'']">✓ 对</button>
              <button @click="examSelectJudge('错')"
                :class="['judge-btn', examAnswers[practiceStep]==='错'?'selected-exam':'']">✗ 错</button>
            </div>
          </template>

          <!-- ★ 多选题：可多选 -->
          <template v-else-if="currentPQType === 'multiple'">
            <div v-if="practiceMode!=='exam'">
              <button v-for="(opt,key) in currentPQ.options" :key="key"
                @click="toggleMultipleOption(key)"
                :disabled="practiceAnswered"
                :class="['opt-btn', getMultipleOptionClass(key)]">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
              <!-- 多选题确认按钮 -->
              <button v-if="!practiceAnswered && multipleSelected.length > 0"
                @click="confirmMultiple"
                class="btn-next" style="margin-top:4px;">确认提交</button>
            </div>
            <div v-else>
              <button v-for="(opt,key) in currentPQ.options" :key="'e'+key"
                @click="examToggleMultiple(key)"
                :class="['opt-btn', isExamMultipleSelected(key)?'selected-exam':'']">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
          </template>

          <!-- ★ 完形填空 -->
          <template v-else-if="currentPQType === 'cloze'">
            <div class="q-box">
              <div class="q-box-top">
                <span class="q-type-badge" style="background: #F3E8FF; color: #7C3AED;">完形填空</span>
                <div style="display:flex;align-items:center;">
                  <button @click="reportQuestion" class="btn-report" title="报错">📝</button>
                  <button @click="toggleFavorite" class="btn-fav">{{ isFavorited ? '⭐' : '☆' }}</button>
                </div>
              </div>
              <div class="cloze-passage" v-html="renderClozePassage(currentPQ)"></div>
            </div>
            <div v-if="currentPQ.blanks && currentPQ.blanks[clozeBlankIndex]" class="cloze-blank-options">
              <div class="cloze-blank-label">第 {{ clozeBlankIndex + 1 }} 空</div>
              <button v-for="(opt, key) in currentPQ.blanks[clozeBlankIndex].options" :key="key"
                @click="selectClozeOption(key)"
                :disabled="practiceAnswered"
                :class="['opt-btn', getClozeOptionClass(key)]">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
          </template>

          <!-- ★ 背诵题 -->
          <template v-else-if="currentPQType === 'recite'">
            <div class="recite-card">
              <div class="q-box-top" style="justify-content: flex-end; margin-bottom: 12px;">
                <button @click="reportQuestion" class="btn-report" title="报错">📝</button>
                <button @click="toggleFavorite" class="btn-fav">{{ isFavorited ? '⭐' : '☆' }}</button>
              </div>
              <div class="recite-question">{{ currentPQ.title }}</div>
              <div v-if="reciteShowAnswer" class="recite-answer" :class="{flash: reciteFlash}">{{ currentPQ.answer }}</div>
              <div v-if="!reciteShowAnswer && !reciteFlash" class="recite-actions">
                <button @click="showReciteAnswer" class="recite-btn recite-btn-show">👁 查看答案</button>
                <button @click="peekReciteAnswer" class="recite-btn recite-btn-peek">⚡ 瞄一眼 (1秒)</button>
              </div>
              <div v-if="reciteShowAnswer || reciteFlash" class="recite-actions">
                <button @click="markReciteKnown" class="recite-btn recite-btn-known">✅ 记住了</button>
                <button @click="markReciteUnknown" class="recite-btn recite-btn-unknown">❌ 没记住</button>
              </div>
            </div>
          </template>

          <!-- ★ 单选题 -->
          <template v-else>
            <div v-if="practiceMode!=='exam'">
              <button v-for="(opt,key) in currentPQ.options" :key="key"
                @click="selectOption(key)"
                :disabled="practiceAnswered"
                :class="['opt-btn', getPracticeOptionClass(key)]">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
            <div v-else>
              <button v-for="(opt,key) in currentPQ.options" :key="'e'+key"
                @click="examSelectOption(key)"
                :class="['opt-btn', examAnswers[practiceStep]===key?'selected-exam':'']">
                <span class="opt-key">{{ key }}.</span>{{ opt }}
              </button>
            </div>
          </template>

          <!-- 反馈区域（非考试模式，选择题/判断题/完形填空） -->
          <div v-if="practiceAnswered && practiceMode!=='exam' && currentPQType !== 'recite'" class="feedback-box">
            <div :class="practiceIsCorrect ? 'feedback-correct' : 'feedback-wrong'">
              {{ practiceIsCorrect ? '🎉 回答正确！' : '❌ 回答错误' }}
            </div>
            <div class="feedback-ans">正确答案：<b>{{ formatPracticeAnswer(currentPQ) }}</b></div>
          </div>

          <!-- 问AI解析按钮（非考试模式，已答题时显示，背诵题不显示） -->
          <button v-if="practiceAnswered && practiceMode!=='exam' && !aiExplanation && currentPQType !== 'recite'" @click="askAI" :disabled="aiLoading" class="ai-explain-btn">
            {{ aiLoading ? '⏳ AI 正在解析...' : '💡 问AI解析' }}
          </button>

          <!-- AI解析结果卡片 -->
          <div v-if="aiExplanation" class="ai-explain-card">
            <div style="font-weight:700; margin-bottom:6px; color:var(--blue);">💡 AI 解析</div>
            {{ aiExplanation }}
          </div>
        </div>
      </div>
      <div class="practice-footer">
        <button v-if="practiceMode!=='exam'" @click="prevQuestion" :disabled="practiceStep===0" class="btn-prev">上一题</button>
        <button v-if="practiceMode!=='exam'" @click="nextQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '完成 ✓' : '下一题 →' }}</button>
        <button v-if="practiceMode==='exam'" @click="prevQuestion" :disabled="practiceStep===0" class="btn-prev">上一题</button>
        <button v-if="practiceMode==='exam'" @click="nextExamQuestion" class="btn-next">{{ practiceStep===practiceQuestions.length-1 ? '交卷 ✓' : '下一题 →' }}</button>
      </div>
    </div>

    <!-- ===== 考试结果 ===== -->
    <main v-if="page==='examResult'" style="overflow-y:auto;flex:1;padding-bottom:40px;">
      <div class="result-hero">
        <div class="result-emoji">{{ examScoreEmoji }}</div>
        <div class="result-score">{{ examScore }}<span style="font-size:20px;color:#94A3B8;">分</span></div>
        <div class="result-sub">{{ examCorrectCount }} / {{ examQuestions.length }} 题正确</div>
        <div :class="['result-pass-badge', examScore >= 60 ? 'pass' : 'fail']">
          {{ examScore >= 60 ? '🎉 考试合格！' : '😢 考试不合格，继续加油！' }}
        </div>
      </div>
      <div style="padding:0 16px;">
        <div v-for="(q,i) in examQuestions" :key="i" :class="['result-item', isExamCorrect(q,i)?'ok':'bad']">
          <div :class="isExamCorrect(q,i)?'result-badge-ok':'result-badge-bad'">{{ isExamCorrect(q,i) ? '✓ 正确' : '✗ 错误' }}</div>
          <div class="result-q">{{ q.title }}</div>
          <div v-if="!isExamCorrect(q,i)" class="result-your">你的答案：{{ examAnswers[i]||'未作答' }}</div>
          <div class="result-right">正确答案：{{ formatExamAnswer(q) }}</div>
        </div>
        <button @click="goHome" class="btn-primary" style="margin-top:16px;">返回首页</button>
      </div>
    </main>

    <!-- ===== 上传题库 ===== -->
    <main v-if="page==='upload'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回</button>
      <div class="upload-card">
        <div class="upload-title">📤 上传新题库</div>
        <div class="form-group">
          <input v-model="uploadForm.bankName" class="form-input" placeholder="题库名称（例：第三章综合题）">
        </div>
        <div class="form-group">
          <input v-model="uploadTagsText" class="form-input" placeholder="标签（用逗号分隔，如：高数,期末,第三章）">
        </div>
        <!-- 题型选择 tab -->
        <div class="tab-bar" style="border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--gray-100);">
          <button @click="uploadTab='choice'; uploadBankType='choice'" :class="['tab-btn', uploadTab==='choice'?'active':'']">选择题库</button>
          <button @click="uploadTab='cloze'; uploadBankType='cloze'" :class="['tab-btn', uploadTab==='cloze'?'active':'']">完形填空</button>
          <button @click="uploadTab='recite'; uploadBankType='recite'" :class="['tab-btn', uploadTab==='recite'?'active':'']">背诵题库</button>
        </div>
        <div class="form-group">
          <textarea v-if="uploadTab==='choice'" v-model="uploadForm.text" class="form-textarea" rows="12"
            placeholder="把题目和答案全选复制粘贴到这里...&#10;&#10;支持多种格式，AI 会自动识别提取单选题、多选题和判断题。"></textarea>
          <textarea v-if="uploadTab==='cloze'" v-model="uploadForm.text" class="form-textarea" rows="12"
            placeholder="请粘贴完形填空短文..."></textarea>
          <textarea v-if="uploadTab==='recite'" v-model="uploadForm.text" class="form-textarea" rows="12"
            placeholder="格式：题目===答案&#10;多题用---分隔"></textarea>
        </div>
        <p class="upload-hint">💡 管理员上传直接公开，普通用户上传需审核后发布</p>
        <button @click="submitUpload" :disabled="uploading" class="btn-primary">
          {{ uploading ? '⏳ 提交中...' : '🤖 开始 AI 智能导入' }}
        </button>
        <div v-if="uploadMsg" :class="['upload-msg', uploadMsgClass]" style="margin-top:10px;">{{ uploadMsg }}</div>
        <!-- 异步解析进度 -->
        <div v-if="uploadPolling" class="upload-progress">
          <div class="upload-progress-bar"><div class="upload-progress-fill"></div></div>
          <div class="upload-progress-text">🤖 AI 正在后台解析题目，请耐心等待...</div>
        </div>
      </div>
    </main>

    <!-- ===== 管理后台 ===== -->
    <main v-if="page==='admin'" style="overflow-y:auto;flex:1;">
      <button @click="page='home'" class="back-btn">‹ 返回</button>
      <div style="font-size:16px;font-weight:800;margin-bottom:14px;">👑 管理后台</div>
      <div class="tab-bar" style="border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--gray-100);">
        <button @click="adminTab='banks'; loadAdminBanks()" :class="['tab-btn', adminTab==='banks'?'active':'']">题库管理</button>
        <button @click="adminTab='users'; loadAdminUsers()" :class="['tab-btn', adminTab==='users'?'active':'']">用户管理</button>
        <button @click="adminTab='reports'; loadAdminReports()" :class="['tab-btn', adminTab==='reports'?'active':'']">报错管理</button>
      </div>

      <div v-if="adminTab==='banks'">
        <div v-for="bank in adminBanks" :key="bank._id" class="admin-bank-card">
          <div class="admin-bank-row">
            <div>
              <div style="font-size:14px;font-weight:600;">{{ bank.bankName }}
                <span style="font-size:11px;color:var(--gray-400);margin-left:6px;">{{ bank.questions ? bank.questions.length : 0 }}题</span>
              </div>
              <div style="font-size:11px;color:var(--gray-400);margin-top:2px;">
                上传者：{{ bank.uploaderNickname || maskEmail(bank.uploadedBy) || '神秘同学' }}
              </div>
            </div>
            <button @click="toggleBankStatus(bank)" :class="bank.isPublic?'btn-toggle-on':'btn-toggle-off'">
              {{ bank.isPublic ? '公开中' : '已隐藏' }}
            </button>
          </div>
          <div style="display:flex;gap:8px;">
            <button @click="deleteBank(bank._id, bank.bankName)" class="btn-del">🗑 删除题库</button>
          </div>
        </div>
        <div v-if="adminBanks.length===0" class="empty"><div class="emoji">📭</div><div>暂无题库数据</div></div>
      </div>

      <div v-if="adminTab==='users'">
        <div v-for="user in adminUsers" :key="user._id" class="admin-user-card">
          <div>
            <div class="user-name">
              {{ user.nickname || maskEmail(user.email) }}
              <span v-if="user.role==='admin'" style="color:var(--gold);font-size:12px;">👑 管理员</span>
              <span v-if="user.role==='subadmin'" class="subadmin-tag">🛡️ 副管理员</span>
            </div>
            <div class="user-date">注册：{{ new Date(user.createdAt).toLocaleDateString() }}</div>
          </div>
          <div v-if="user._id !== adminSelfId" style="display:flex;gap:6px;flex-wrap:wrap;">
            <button v-if="currentUser.role==='admin' && user.role==='admin'" @click="toggleRole(user, 'subadmin')" class="btn-role">降为副管</button>
            <button v-if="currentUser.role==='admin' && user.role==='subadmin'" @click="toggleRole(user, 'admin')" class="btn-role">升为管理员</button>
            <button v-if="currentUser.role==='admin' && (user.role==='admin' || user.role==='subadmin')" @click="toggleRole(user, 'user')" class="btn-role">降为普通</button>
            <button v-if="currentUser.role==='admin' && user.role==='user'" @click="toggleRole(user, 'admin')" class="btn-role">升为管理员</button>
            <button v-if="currentUser.role==='subadmin' && user.role==='subadmin'" @click="toggleRole(user, 'user')" class="btn-role">降为普通</button>
            <button v-if="currentUser.role==='subadmin' && user.role==='user'" @click="toggleRole(user, 'subadmin')" class="btn-role">升为副管</button>
            <button @click="deleteUser(user._id)" class="btn-del-user">删除</button>
          </div>
        </div>
        <div v-if="adminUsers.length===0" class="empty"><div class="emoji">👥</div><div>暂无用户</div></div>
      </div>

      <div v-if="adminTab==='reports'">
        <div v-for="report in adminReports" :key="report._id" class="report-card">
          <div class="report-q">{{ report.questionTitle || '未知题目' }}</div>
          <div class="report-reason">报错原因：{{ report.reason }}</div>
          <div class="report-meta">
            <span>报错人：{{ report.reporterNickname || '未知用户' }} · {{ new Date(report.createdAt).toLocaleString() }}</span>
            <button @click="resolveReport(report)" :disabled="report.resolved" :class="'btn-resolved'">
              {{ report.resolved ? '已处理' : '标记已处理' }}
            </button>
          </div>
        </div>
        <div v-if="adminReports.length===0" class="empty"><div class="emoji">✅</div><div>暂无报错记录</div></div>
      </div>
    </main>
  </template>

</div>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;
const API = 'https://quiz-server-ulpb.onrender.com/api';

createApp({
  setup() {
    const token = ref(localStorage.getItem('quiz_token') || '');
    const practiceLimit = ref(20);
    const examLimit = ref(20);
    const currentUser = ref(JSON.parse(localStorage.getItem('quiz_user') || '{}'));
    const authTab = ref('login');
    const authForm = ref({ email: '', password: '' });
    const authError = ref('');
    const code = ref('');
    const countdown = ref(0);
    const isDrawerOpen = ref(false);
    const isEditingProfile = ref(false);
    const editForm = ref({ nickname: '', gender: '保密', avatar: '⚡' });

    // ===== 支持作者弹窗 =====
    const showSupportModal = ref(false);
    const supportPayType = ref('');
    const openSupport = () => { showSupportModal.value = true; supportPayType.value = ''; };
    const closeSupport = () => { showSupportModal.value = false; supportPayType.value = ''; };
    const selectPayType = (type) => { supportPayType.value = type; };

    // ===== 暗黑模式 =====
    const isDarkMode = ref(localStorage.getItem('quiz_dark_mode') === 'true');

    const applyDarkMode = (dark) => {
      if (dark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    };

    const toggleDarkMode = () => {
      isDarkMode.value = !isDarkMode.value;
      localStorage.setItem('quiz_dark_mode', isDarkMode.value);
      applyDarkMode(isDarkMode.value);
    };

    // 初始化暗黑模式
    applyDarkMode(isDarkMode.value);

    // ★★★ 修复：清空答题统计 — 真正调用后端接口 ★★★
    const clearStats = async () => {
      if (!confirm('⚠️ 警告：确定要清空您在云端的所有做题数量和正确率统计吗？该操作不可逆！')) return;
      const r = await api('/user/clear-stats', { method: 'POST' });
      if (r.success) {
        alert('答题统计重置成功！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    // ★★★ 修复：清空错题本 — 真正调用后端接口 ★★★
    const clearWrongQuestions = async () => {
      if (!confirm('⚠️ 确定要一键清空您的错题本吗？')) return;
      const r = await api('/wrong-questions/clear', { method: 'POST', body: JSON.stringify({ all: true }) });
      if (r.success) {
        wrongList.value = [];
        alert('错题本已成功清空！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    // ★★★ 修复：清空收藏夹 — 真正调用后端接口 ★★★
    const clearFavoritesAction = async () => {
      if (!confirm('⚠️ 确定要清空您收藏的所有题目吗？')) return;
      const r = await api('/favorites/clear', { method: 'POST', body: JSON.stringify({ all: true }) });
      if (r.success) {
        favoriteList.value = [];
        alert('收藏夹已清空！');
        await loadMe();
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    const upcomingFeature = () => { alert('🚀 正在紧锣密鼓开发中，下一迭代版本即将公开，敬请期待！'); };

    const startEditProfile = () => {
      isEditingProfile.value = true;
      editForm.value = {
        nickname: currentUser.value.nickname || '',
        gender: currentUser.value.gender || '保密',
        avatar: currentUser.value.avatar || '⚡'
      };
    };

    const saveProfile = async () => {
      const r = await api('/user/profile', { method: 'PUT', body: JSON.stringify(editForm.value) });
      if (r.success) {
        currentUser.value = { ...currentUser.value, ...editForm.value };
        localStorage.setItem('quiz_user', JSON.stringify(currentUser.value));
        isEditingProfile.value = false;
        alert('资料保存成功！');
        await loadMe();
      } else {
        alert('保存失败：' + (r.error || '未知错误'));
      }
    };

    const logout = () => {
      token.value = ''; currentUser.value = {}; meData.value = {};
      wrongList.value = []; favoriteList.value = [];
      page.value = 'home'; homeTab.value = 'banks'; isDrawerOpen.value = false; isEditingProfile.value = false;
      localStorage.removeItem('quiz_token'); localStorage.removeItem('quiz_user');
    };

    const api = async (path, options = {}) => {
      try {
        const res = await fetch(API + path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token.value,
            ...(options.headers || {})
          }
        });
        // Token 过期，自动跳转登录
        if (res.status === 401) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || '登录已过期，请重新登录');
          logout();
          return { success: false, error: data.error || '登录已过期' };
        }
        return res.json();
      } catch(e) {
        return { success: false, error: '网络异常' };
      }
    };

    const sendCode = async () => {
      if (!authForm.value.email) { alert('请先填写邮箱'); return; }
      if (countdown.value > 0) return;
      countdown.value = 60;
      const timer = setInterval(() => { countdown.value--; if (countdown.value <= 0) clearInterval(timer); }, 1000);

      // 前端生成验证码
      const codeVal = Math.floor(100000 + Math.random() * 900000).toString();

      try {
        // 用 EmailJS 直接发邮件（不经过后端，绕过 Render SMTP 限制）
        await emailjs.send('service_1516439173', 'template_1516439173', {
          to_email: authForm.value.email,
          code: codeVal
        }, 'jjS_Cb3bznEgenFdw');
        alert('验证码已发送！');
      } catch(e) {
        alert('验证码发送失败：' + (e.text || e.message || '未知错误'));
        countdown.value = 0;
        return;
      }

      // 把验证码发给后端存储（后端只存储，不发邮件）
      await fetch(API + '/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: authForm.value.email, code: codeVal })
      });
    };

    const doAuth = async () => {
      authError.value = '';
      if (!authForm.value.email || !authForm.value.password) { authError.value = '请填写邮箱和密码'; return; }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(authForm.value.email)) { authError.value = '请输入有效的邮箱地址'; return; }
      const payload = { ...authForm.value };
      if (authTab.value === 'register') payload.code = code.value;
      const result = await api(`/${authTab.value}`, { method: 'POST', body: JSON.stringify(payload) });
      if (result.success) {
        token.value = result.token;
        currentUser.value = result.user || { email: authForm.value.email, role: 'user' };
        localStorage.setItem('quiz_token', result.token);
        localStorage.setItem('quiz_user', JSON.stringify(currentUser.value));
        authForm.value = { email: '', password: '' };
        code.value = '';
        fetchBanks(); loadMe();
      } else { authError.value = result.error; }
    };

    const goTuteOfficial = () => { window.open('https://www.tute.edu.cn', '_blank'); };
    const shareApp = () => {
      const shareUrl = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(shareUrl).then(() => alert('🚀 链接已复制到剪贴板，快分享给天职师大的同学们吧！')).catch(() => alert('分享链接为：' + shareUrl));
      } else { alert('分享链接为：' + shareUrl); }
    };
    const showSuggest = () => { const s = prompt('💡 请输入你的建议（将通过邮件反馈给管理员）：'); if (s && s.trim()) alert('感谢你的建议！我们会认真考虑 🙏'); };

    const page = ref('home');
    const homeTab = ref('banks');
    const banks = ref([]);
    const meData = ref({});
    const wrongList = ref([]);
    const favoriteList = ref([]);

    // ===== 题库搜索 =====
    const searchQuery = ref('');
    let searchDebounceTimer = null;

    const onSearchInput = () => {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        fetchBanks(searchQuery.value);
      }, 300);
    };

    // ===== 题库标签筛选 =====
    const activeTagFilter = ref('');

    const allBankTags = computed(() => {
      const tagSet = new Set();
      banks.value.forEach(bank => {
        if (bank.tags && Array.isArray(bank.tags)) {
          bank.tags.forEach(tag => tagSet.add(tag));
        }
      });
      return Array.from(tagSet);
    });

    const filteredBanks = computed(() => {
      let result = banks.value;
      if (activeTagFilter.value) {
        result = result.filter(bank => bank.tags && Array.isArray(bank.tags) && bank.tags.includes(activeTagFilter.value));
      }
      return result;
    });

    const accuracy = computed(() => {
      if (!meData.value.stats || meData.value.stats.totalAnswered === 0) return '0%';
      return Math.round(meData.value.stats.totalCorrect / meData.value.stats.totalAnswered * 100) + '%';
    });

    const fetchBanks = async (query) => {
      let url = '/get-banks-list';
      if (query && query.trim()) {
        url += '?query=' + encodeURIComponent(query.trim());
      }
      const r = await api(url);
      if (r.success) banks.value = r.data;
    };
    const loadMe = async () => { const r = await api('/me'); if (r.success) meData.value = r.data; };
    const loadWrong = async () => { const r = await api('/wrong-questions'); if (r.success) wrongList.value = r.data; };
    const loadFavorites = async () => { const r = await api('/favorites'); if (r.success) favoriteList.value = r.data; };
    const goHome = () => { page.value = 'home'; homeTab.value = 'banks'; searchQuery.value = ''; activeTagFilter.value = ''; fetchBanks(); };

    onMounted(() => { if (token.value) { fetchBanks(); loadMe(); } });

    const maskEmail = (email) => {
      if (!email || typeof email !== 'string') return '';
      const parts = email.split('@');
      if (parts.length < 2) return email;
      const name = parts[0]; const domain = parts[1];
      if (name.length <= 3) return name + '***@' + domain;
      return name.substring(0, 3) + '***@' + domain;
    };

    // ===== 题型工具函数 =====
    const getTypeName = (type) => {
      if (type === 'multiple') return '多选';
      if (type === 'judge') return '判断';
      if (type === 'cloze') return '完形';
      if (type === 'recite') return '背诵';
      return '单选';
    };
    const getTypeClass = (type) => {
      if (type === 'multiple') return 'q-type-multiple';
      if (type === 'judge') return 'q-type-judge';
      if (type === 'cloze') return 'q-type-cloze';
      if (type === 'recite') return 'q-type-recite';
      return 'q-type-single';
    };
    const formatAnswer = (q) => {
      if (!q) return '-';
      if (q.type === 'judge') return q.answer || '-';
      if (q.type === 'multiple') {
        const ans = String(q.answer || '');
        return ans.split('').map(a => a + '. ' + (q.options ? q.options[a] || '' : '')).join('、');
      }
      if (q.type === 'cloze') {
        const blanks = q.blanks || [];
        return blanks.map((b, i) => `第${i+1}空: ${b.answer}`).join('、');
      }
      if (q.type === 'recite') return q.answer || '-';
      return (q.answer || '-') + '. ' + (q.options ? (q.options[q.answer] || '') : '');
    };
    const formatPracticeAnswer = (q) => {
      if (!q) return '-';
      if (q.type === 'judge') return q.answer;
      if (q.type === 'multiple') {
        return String(q.answer).split('').map(a => a + '. ' + (q.options[a] || '')).join('、');
      }
      if (q.type === 'cloze') {
        const blank = q.blanks ? q.blanks[clozeBlankIndex.value] : null;
        return blank ? blank.answer : '-';
      }
      if (q.type === 'recite') return q.answer;
      return q.answer + '. ' + (q.options ? q.options[q.answer] : '');
    };
    const formatExamAnswer = (q) => {
      if (!q) return '-';
      if (q.type === 'cloze') {
        const blank = q.blanks && q.blanks[0] ? q.blanks[0] : null;
        return blank ? blank.answer : '-';
      }
      if (q.type === 'recite') return q.answer;
      return formatPracticeAnswer(q);
    };

    // ===== 题库与练习 =====
    const currentBank = ref({});
    const currentBankQuestions = ref([]);
    const openBank = async (bank) => {
      const r = await api('/get-bank/' + bank._id);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; page.value = 'selectMode'; }
    };

    const practiceMode = ref('sequential');
    const practiceQuestions = ref([]);
    const practiceStep = ref(0);
    const practiceAnswered = ref(false);
    const practiceSelectedOption = ref(null);
    const practiceIsCorrect = ref(false);
    const sessionCorrect = ref(0);
    const sessionWrong = ref(0);
    const sessionResults = ref([]);
    const examAnswers = ref([]);
    const examQuestions = ref([]);
    const multipleSelected = ref([]); // 多选题已选选项
    const examMultipleSelected = ref({}); // 考试模式多选题已选

    // 完形填空
    const clozeBlankIndex = ref(0);

    // 背诵题
    const reciteShowAnswer = ref(false);
    const reciteFlash = ref(false);
    let reciteFlashTimer = null;

    // ===== 考试倒计时 =====
    const examDuration = ref(30); // 分钟
    const examTimeLeft = ref(0); // 秒
    let examTimerInterval = null;

    const startExamTimer = () => {
      examTimeLeft.value = examDuration.value * 60;
      if (examTimerInterval) clearInterval(examTimerInterval);
      examTimerInterval = setInterval(() => {
        examTimeLeft.value--;
        if (examTimeLeft.value <= 0) {
          clearInterval(examTimerInterval);
          examTimerInterval = null;
          // 时间到，自动交卷
          nextExamQuestion();
        }
      }, 1000);
    };

    const stopExamTimer = () => {
      if (examTimerInterval) { clearInterval(examTimerInterval); examTimerInterval = null; }
    };

    const examTimeDisplay = computed(() => {
      const m = Math.floor(examTimeLeft.value / 60);
      const s = examTimeLeft.value % 60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    });

    // ===== AI 解析 =====
    const aiExplanation = ref('');
    const aiLoading = ref(false);

    const askAI = async () => {
      if (aiLoading.value || aiExplanation.value) return;
      aiLoading.value = true;
      try {
        const q = currentPQ.value;
        const payload = { questionType: q.type };

        if (q.type === 'cloze') {
          const blank = q.blanks ? q.blanks[clozeBlankIndex.value] : null;
          payload.passage = q.passage;
          payload.blankIndex = clozeBlankIndex.value;
          payload.blankOptions = blank ? blank.options : {};
          payload.userAnswer = practiceSelectedOption.value;
          payload.correctAnswer = blank ? blank.answer : '';
        } else {
          payload.question = q.title;
          payload.userAnswer = practiceSelectedOption.value;
          payload.correctAnswer = q.answer;
        }

        const r = await api('/ask-ai', { method: 'POST', body: JSON.stringify(payload) });
        if (r.success && r.explanation) {
          aiExplanation.value = r.explanation;
        } else {
          aiExplanation.value = '解析失败：' + (r.error || '请稍后再试');
        }
      } catch(e) {
        aiExplanation.value = '请求失败，请稍后再试。';
      }
      aiLoading.value = false;
    };

    const currentPQ = computed(() => practiceQuestions.value[practiceStep.value] || {});
    const currentPQType = computed(() => {
      const q = currentPQ.value;
      if (q.type === 'multiple') return 'multiple';
      if (q.type === 'judge') return 'judge';
      if (q.type === 'cloze') return 'cloze';
      if (q.type === 'recite') return 'recite';
      return 'single';
    });
    const currentPQTypeName = computed(() => {
      const t = currentPQType.value;
      if (t === 'multiple') return '多选题';
      if (t === 'judge') return '判断题';
      if (t === 'cloze') return '完形填空';
      if (t === 'recite') return '背诵题';
      return '单选题';
    });

    const isFavorited = computed(() => {
      if (!meData.value.favorites) return false;
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return false;
      return meData.value.favorites.some(f => f.bankId === currentBank.value._id && f.questionIndex === q._origIndex);
    });

    const shuffle = (arr) => arr.map(v => ({v, s: Math.random()})).sort((a,b) => a.s-b.s).map(x => x.v);

    const startPractice = (mode) => {
      practiceMode.value = mode; practiceStep.value = 0; practiceAnswered.value = false;
      practiceSelectedOption.value = null; practiceIsCorrect.value = false;
      sessionCorrect.value = 0; sessionWrong.value = 0;
      sessionResults.value = []; examAnswers.value = []; multipleSelected.value = []; examMultipleSelected.value = {};
      aiExplanation.value = ''; aiLoading.value = false;
      clozeBlankIndex.value = 0;
      clozeBlankAnswers.value = {};
      reciteShowAnswer.value = false;
      reciteFlash.value = false;
      let qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i}));
      if (mode === 'random') qs = shuffle(qs);
      else if (mode === 'exam') { qs = shuffle(qs).slice(0, Math.min(examLimit.value === '全部' ? qs.length : Number(examLimit.value), qs.length)); examAnswers.value = new Array(qs.length).fill(null); }
      else if (mode === 'slim') {
        const wrongIdxSet = new Set((meData.value.wrongQuestions||[]).filter(w => w.bankId===currentBank.value._id).map(w => w.questionIndex));
        qs = qs.filter(q => wrongIdxSet.has(q._origIndex));
        if (qs.length === 0) { alert('没有错题，改用顺序练习'); qs = currentBankQuestions.value.map((q,i) => ({...q, _origIndex: i})); }
      }
      if (mode !== 'exam' && practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
      practiceQuestions.value = qs; examQuestions.value = qs; page.value = 'practice';
      if (mode === 'exam') startExamTimer();
    };

    const startWrongPractice = async () => {
      await loadWrong();
      if (wrongList.value.length === 0) return;
      const firstBankId = wrongList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) { currentBank.value = bank; currentBankQuestions.value = r.data; startPractice('slim'); }
    };

    const startFavPractice = async () => {
      if (favoriteList.value.length === 0) return;
      const firstBankId = favoriteList.value[0].bankId;
      const bank = banks.value.find(b => b._id === firstBankId);
      if (!bank) return;
      const r = await api('/get-bank/' + firstBankId);
      if (r.success) {
        currentBank.value = {...bank}; currentBankQuestions.value = r.data;
        practiceMode.value = 'random'; practiceStep.value = 0; practiceAnswered.value = false;
        practiceSelectedOption.value = null; practiceIsCorrect.value = false;
        sessionCorrect.value = 0; sessionWrong.value = 0; sessionResults.value = [];
        multipleSelected.value = []; aiExplanation.value = ''; aiLoading.value = false;
        const favIdxSet = new Set(favoriteList.value.filter(f => f.bankId===firstBankId).map(f => f.questionIndex));
        let qs = r.data.map((q,i) => ({...q, _origIndex: i})).filter(q => favIdxSet.has(q._origIndex));
        if (practiceLimit.value !== '全部') qs = qs.slice(0, Number(practiceLimit.value));
        practiceQuestions.value = qs; page.value = 'practice';
      }
    };

    // ★ 单选题选择
    const selectOption = (key) => {
      if (practiceAnswered.value || practiceMode.value === 'exam') return;
      practiceSelectedOption.value = key; practiceAnswered.value = true;
      const isCorrect = key === currentPQ.value.answer;
      practiceIsCorrect.value = isCorrect;
      if (isCorrect) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect });
    };

    // ★ 判断题选择
    const selectJudge = (val) => {
      if (practiceAnswered.value || practiceMode.value === 'exam') return;
      practiceSelectedOption.value = val; practiceAnswered.value = true;
      const isCorrect = val === currentPQ.value.answer;
      practiceIsCorrect.value = isCorrect;
      if (isCorrect) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect });
    };
    const getJudgeClass = (val) => {
      if (!practiceAnswered.value) return '';
      if (val === currentPQ.value.answer) return 'correct';
      if (practiceSelectedOption.value === val) return 'wrong';
      return 'dim';
    };

    // ★ 多选题选择（非考试模式）
    const toggleMultipleOption = (key) => {
      if (practiceAnswered.value) return;
      const idx = multipleSelected.value.indexOf(key);
      if (idx !== -1) multipleSelected.value.splice(idx, 1);
      else multipleSelected.value.push(key);
    };
    const getMultipleOptionClass = (key) => {
      if (!practiceAnswered.value) {
        return multipleSelected.value.includes(key) ? 'selected-multiple' : '';
      }
      // 已提交后显示对错
      const correctKeys = String(currentPQ.value.answer || '').split('');
      if (correctKeys.includes(key)) return 'correct';
      if (multipleSelected.value.includes(key)) return 'wrong';
      return 'dim';
    };
    const confirmMultiple = () => {
      if (practiceAnswered.value) return;
      const selected = [...multipleSelected.value].sort().join('');
      const correct = String(currentPQ.value.answer || '').split('').sort().join('');
      practiceSelectedOption.value = selected;
      practiceAnswered.value = true;
      practiceIsCorrect.value = selected === correct;
      if (practiceIsCorrect.value) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect: practiceIsCorrect.value });
    };

    // 渲染完形填空短文（将 ____ 替换为带序号的span）
    const renderClozePassage = (q) => {
      if (!q || !q.passage) return '';
      let html = q.passage;
      const blanks = q.blanks || [];
      blanks.forEach((blank, idx) => {
        const cls = idx === clozeBlankIndex.value ? 'blank-num current' : (clozeBlankAnswers.value[idx] ? 'blank-num answered' : 'blank-num');
        html = html.replace('____', `<span class="${cls}">${idx + 1}</span>`);
      });
      return html;
    };

    // 完形填空选择
    const clozeBlankAnswers = ref({});
    const selectClozeOption = (key) => {
      if (practiceAnswered.value || practiceMode.value === 'exam') return;
      const blank = currentPQ.value.blanks[clozeBlankIndex.value];
      if (!blank) return;
      clozeBlankAnswers.value[clozeBlankIndex.value] = key;
      const isCorrect = key === blank.answer;
      practiceSelectedOption.value = key;
      practiceAnswered.value = true;
      practiceIsCorrect.value = isCorrect;
      if (isCorrect) sessionCorrect.value++; else sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect });
    };
    const getClozeOptionClass = (key) => {
      if (!practiceAnswered.value) return '';
      const blank = currentPQ.value.blanks[clozeBlankIndex.value];
      if (!blank) return '';
      if (key === blank.answer) return 'correct';
      if (clozeBlankAnswers.value[clozeBlankIndex.value] === key) return 'wrong';
      return 'dim';
    };

    // 背诵题交互
    const showReciteAnswer = () => { reciteShowAnswer.value = true; };
    const peekReciteAnswer = () => {
      reciteFlash.value = true;
      if (reciteFlashTimer) clearTimeout(reciteFlashTimer);
      reciteFlashTimer = setTimeout(() => { reciteFlash.value = false; }, 1000);
    };
    const markReciteKnown = () => {
      practiceAnswered.value = true;
      practiceIsCorrect.value = true;
      sessionCorrect.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect: true });
    };
    const markReciteUnknown = () => {
      practiceAnswered.value = true;
      practiceIsCorrect.value = false;
      sessionWrong.value++;
      sessionResults.value.push({ questionIndex: currentPQ.value._origIndex, isCorrect: false });
    };

    // ★ 考试模式选择
    const examSelectOption = (key) => { examAnswers.value[practiceStep.value] = key; };
    const examSelectJudge = (val) => { examAnswers.value[practiceStep.value] = val; };
    const examToggleMultiple = (key) => {
      const step = practiceStep.value;
      if (!examMultipleSelected.value[step]) examMultipleSelected.value[step] = [];
      const arr = examMultipleSelected.value[step];
      const idx = arr.indexOf(key);
      if (idx !== -1) arr.splice(idx, 1); else arr.push(key);
      examAnswers.value[step] = [...arr].sort().join('');
    };
    const isExamMultipleSelected = (key) => {
      const step = practiceStep.value;
      return examMultipleSelected.value[step] && examMultipleSelected.value[step].includes(key);
    };

    const getPracticeOptionClass = (key) => {
      if (!practiceAnswered.value) return '';
      if (key === currentPQ.value.answer) return 'correct';
      if (practiceSelectedOption.value === key) return 'wrong';
      return 'dim';
    };

    // ★ 考试结果判断（兼容所有题型）
    const isExamCorrect = (q, i) => {
      const userAns = examAnswers.value[i];
      if (!userAns) return false;
      if (q.type === 'judge') return userAns === q.answer;
      if (q.type === 'multiple') {
        return [...String(userAns)].sort().join('') === [...String(q.answer)].sort().join('');
      }
      if (q.type === 'cloze') {
        // 完形填空考试模式简化处理：只考第一个空
        const blank = q.blanks && q.blanks[0] ? q.blanks[0] : null;
        return blank ? userAns === blank.answer : false;
      }
      if (q.type === 'recite') return userAns === 'known';
      return userAns === q.answer;
    };

    const nextQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) {
        practiceStep.value++; practiceAnswered.value = false; practiceSelectedOption.value = null;
        practiceIsCorrect.value = false; multipleSelected.value = [];
        aiExplanation.value = ''; aiLoading.value = false;
        clozeBlankIndex.value = 0;
        reciteShowAnswer.value = false;
        reciteFlash.value = false;
        if (reciteFlashTimer) { clearTimeout(reciteFlashTimer); reciteFlashTimer = null; }
      } else {
        if (sessionResults.value.length > 0) await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
        alert(`练习完成！共${practiceQuestions.value.length}题，答对${sessionCorrect.value}题`);
        goHome();
      }
    };

    const nextExamQuestion = async () => {
      if (practiceStep.value < practiceQuestions.value.length - 1) { practiceStep.value++; }
      else {
        stopExamTimer();
        const results = examQuestions.value.map((q,i) => ({ questionIndex: q._origIndex, isCorrect: isExamCorrect(q, i) }));
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results }) });
        await loadMe(); page.value = 'examResult';
      }
    };

    const prevQuestion = () => {
      if (practiceStep.value > 0) {
        practiceStep.value--; practiceAnswered.value = false; practiceSelectedOption.value = null;
        practiceIsCorrect.value = false; multipleSelected.value = [];
        aiExplanation.value = ''; aiLoading.value = false;
        clozeBlankIndex.value = 0;
        reciteShowAnswer.value = false;
        reciteFlash.value = false;
        if (reciteFlashTimer) { clearTimeout(reciteFlashTimer); reciteFlashTimer = null; }
      }
    };

    const exitPractice = async () => {
      stopExamTimer();
      if (sessionResults.value.length > 0 && practiceMode.value !== 'exam') {
        await api('/submit-results', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, results: sessionResults.value }) });
        await loadMe();
      }
      goHome();
    };

    const examCorrectCount = computed(() => examQuestions.value.filter((q,i) => isExamCorrect(q, i)).length);
    const examScore = computed(() => examQuestions.value.length === 0 ? 0 : Math.round(examCorrectCount.value / examQuestions.value.length * 100));
    const examScoreEmoji = computed(() => examScore.value >= 90 ? '🏆' : examScore.value >= 60 ? '😊' : '😢');

    const toggleFavorite = async () => {
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return;
      await api('/toggle-favorite', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, questionIndex: q._origIndex }) });
      await loadMe();
    };

    // ===== 题目报错 =====
    const reportQuestion = async () => {
      const q = practiceQuestions.value[practiceStep.value];
      if (!q) return;
      const reason = prompt('请输入报错原因（描述题目哪里有问题）：');
      if (!reason || !reason.trim()) return;
      const r = await api('/report-question', {
        method: 'POST',
        body: JSON.stringify({
          bankId: currentBank.value._id,
          questionIndex: q._origIndex,
          questionTitle: q.title,
          reason: reason.trim()
        })
      });
      if (r.success) {
        alert('报错提交成功，感谢反馈！');
      } else {
        alert('提交失败：' + (r.error || '未知错误'));
      }
    };

    // ===== 题库评分 =====
    const rateBank = async (score) => {
      const r = await api('/rate-bank', { method: 'POST', body: JSON.stringify({ bankId: currentBank.value._id, score }) });
      if (r.success) {
        alert('评分成功！感谢你的反馈');
        fetchBanks();
        // 更新当前题库的评分显示
        if (currentBank.value) {
          currentBank.value = { ...currentBank.value, averageRating: r.averageRating, ratingCount: r.ratingCount };
        }
      }
    };

    // ===== 上传题库（异步模式） =====
    const uploadForm = ref({ bankName: '', text: '' });
    const uploadTagsText = ref('');
    const uploading = ref(false);
    const uploadMsg = ref('');
    const uploadMsgClass = ref('');
    const uploadPolling = ref(false);
    let uploadPollTimer = null;
    const uploadBankType = ref('choice');
    const uploadTab = ref('choice');

    const submitUpload = async () => {
      if (!uploadForm.value.bankName || !uploadForm.value.text) { uploadMsg.value = '❌ 请填写题库名称和题目内容'; uploadMsgClass.value = 'err'; return; }
      uploading.value = true; uploadMsg.value = ''; uploadMsgClass.value = ''; uploadPolling.value = false;

      // 解析标签
      const tags = uploadTagsText.value
        ? uploadTagsText.value.split(/[,，]/).map(t => t.trim()).filter(t => t.length > 0)
        : [];

      const payload = { ...uploadForm.value };
      if (tags.length > 0) payload.tags = tags;
      payload.bankType = uploadBankType.value;

      const r = await api('/upload-bank', { method: 'POST', body: JSON.stringify(payload) });
      uploading.value = false;

      if (r.success) {
        if (r.pending && r.bankId) {
          // 异步解析模式：轮询状态
          uploadMsg.value = '✅ 题库已提交，AI 正在后台解析...';
          uploadMsgClass.value = 'pending';
          uploadPolling.value = true;
          uploadForm.value = { bankName: '', text: '' };
          uploadTagsText.value = '';
          pollUploadStatus(r.bankId);
        } else {
          uploadMsg.value = '✅ ' + r.message;
          uploadMsgClass.value = 'ok';
          uploadForm.value = { bankName: '', text: '' };
          uploadTagsText.value = '';
          fetchBanks();
        }
      } else {
        uploadMsg.value = '❌ ' + r.error;
        uploadMsgClass.value = 'err';
      }
    };

    const pollUploadStatus = (bankId) => {
      if (uploadPollTimer) clearInterval(uploadPollTimer);
      uploadPollTimer = setInterval(async () => {
        const r = await api('/bank-status/' + bankId);
        if (r.success && r.parsed) {
          clearInterval(uploadPollTimer);
          uploadPollTimer = null;
          uploadPolling.value = false;
          uploadMsg.value = `✅ 解析完成！共识别 ${r.total} 道题目，${r.isPublic ? '已发布' : '等待管理员审核'}`;
          uploadMsgClass.value = 'ok';
          fetchBanks();
        }
      }, 3000);
    };

    // ===== 管理后台 =====
    const adminTab = ref('banks');
    const adminBanks = ref([]);
    const adminUsers = ref([]);
    const adminReports = ref([]);
    const adminSelfId = computed(() => {
      if (!token.value) return '';
      try { return JSON.parse(atob(token.value.split('.')[1])).id; } catch { return ''; }
    });

    const loadAdminBanks = async () => { const r = await api('/admin/banks'); if (r.success) adminBanks.value = r.data; };
    const loadAdminUsers = async () => { const r = await api('/admin/users'); if (r.success) adminUsers.value = r.data; };
    const loadAdminReports = async () => {
      const r = await api('/admin/reports');
      if (r.success) adminReports.value = r.data;
      else adminReports.value = [];
    };

    const resolveReport = async (report) => {
      const r = await api('/admin/reports/' + report._id + '/resolve', { method: 'PUT' });
      if (r.success) {
        report.resolved = true;
      } else {
        alert('操作失败：' + (r.error || '未知错误'));
      }
    };

    const toggleBankStatus = async (bank) => {
      const r = await api(`/admin/banks/${bank._id}/toggle`, { method: 'PUT' });
      if (r.success || r.message) bank.isPublic = !bank.isPublic;
      else alert('操作失败: ' + (r.error || '未获授权'));
    };

    // ★★★ 修复：删除题库 — 使用 DELETE 方法 ★★★
    const deleteBank = async (id, name) => {
      if (!confirm('确认删除题库「' + name + '」？删除后不可恢复！')) return;
      const r = await api('/admin/banks/' + id, { method: 'DELETE' });
      if (r.success) {
        alert('题库已删除');
        loadAdminBanks(); fetchBanks();
      } else {
        alert('删除失败：' + (r.error || '未知错误'));
      }
    };

    const deleteUser = async (id) => {
      if (!confirm('确认删除该用户？')) return;
      const r = await api('/admin/users/' + id, { method: 'DELETE' });
      if (r.success) loadAdminUsers();
      else alert('删除失败：' + (r.error || '未知错误'));
    };

    const toggleRole = async (user, targetRole) => {
      const r = await api('/admin/users/' + user._id + '/role', { method: 'PUT', body: JSON.stringify({ role: targetRole }) });
      if (r.success) loadAdminUsers();
      else alert('操作失败：' + (r.error || '未知错误'));
    };

    // ===== 动态/社区功能 =====
    const communityPosts = ref([]);
    const newPostContent = ref('');
    const postComments = ref({});
    const showComments = ref({});
    const commentInputs = ref({});

    const formatPostTime = (time) => {
      if (!time) return '';
      const d = new Date(time);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
      return d.toLocaleDateString();
    };

    const loadCommunityPosts = async () => {
      const r = await api('/posts');
      if (r.success) communityPosts.value = r.data || [];
    };

    const submitPost = async () => {
      if (!newPostContent.value.trim()) return;
      const r = await api('/posts', {
        method: 'POST',
        body: JSON.stringify({ content: newPostContent.value.trim() })
      });
      if (r.success) {
        newPostContent.value = '';
        await loadCommunityPosts();
      } else {
        alert('发布失败：' + (r.error || '未知错误'));
      }
    };

    const toggleLike = async (post) => {
      const r = await api('/posts/' + post._id + '/like', { method: 'POST' });
      if (r.success) {
        post.isLiked = !post.isLiked;
        post.likes = (post.likes || 0) + (post.isLiked ? 1 : -1);
      }
    };

    const deletePost = async (id) => {
      if (!confirm('确认删除这条动态？')) return;
      const r = await api('/posts/' + id, { method: 'DELETE' });
      if (r.success) {
        await loadCommunityPosts();
      } else {
        alert('删除失败：' + (r.error || '未知错误'));
      }
    };

    const toggleComments = async (id) => {
      if (showComments.value[id]) {
        showComments.value[id] = false;
      } else {
        showComments.value[id] = true;
        await loadComments(id);
      }
    };

    const loadComments = async (id) => {
      const r = await api('/posts/' + id + '/comments');
      if (r.success) {
        postComments.value = { ...postComments.value, [id]: r.data || [] };
      }
    };

    const submitComment = async (postId) => {
      const content = (commentInputs.value[postId] || '').trim();
      if (!content) return;
      const r = await api('/posts/' + postId + '/comments', {
        method: 'POST',
        body: JSON.stringify({ content })
      });
      if (r.success) {
        commentInputs.value[postId] = '';
        await loadComments(postId);
      } else {
        alert('评论失败：' + (r.error || '未知错误'));
      }
    };

    // ===== 排行榜 =====
    const leaderboard = ref([]);

    const loadLeaderboard = async () => {
      const r = await api('/leaderboard');
      if (r.success) leaderboard.value = r.data || [];
    };

    return {
      token, currentUser, authTab, authForm, authError, code, countdown, sendCode, doAuth, logout, showSuggest,
      isDrawerOpen, isEditingProfile, editForm, clearStats, clearWrongQuestions, clearFavoritesAction, upcomingFeature, startEditProfile, saveProfile,
      showSupportModal, supportPayType, openSupport, closeSupport, selectPayType,
      maskEmail, goTuteOfficial, shareApp,
      isDarkMode, toggleDarkMode,
      page, homeTab, banks, meData, wrongList, favoriteList, accuracy, loadMe, loadWrong, loadFavorites, goHome, fetchBanks,
      searchQuery, onSearchInput,
      allBankTags, activeTagFilter, filteredBanks,
      currentBank, currentBankQuestions, openBank,
      practiceMode, practiceQuestions, practiceStep, practiceAnswered, practiceSelectedOption, practiceIsCorrect,
      sessionCorrect, sessionWrong, examAnswers, examQuestions, currentPQ, currentPQType, currentPQTypeName, isFavorited,
      multipleSelected,
      startPractice, startWrongPractice, startFavPractice,
      selectOption, selectJudge, getJudgeClass, toggleMultipleOption, getMultipleOptionClass, confirmMultiple,
      clozeBlankIndex, clozeBlankAnswers, renderClozePassage, selectClozeOption, getClozeOptionClass,
      reciteShowAnswer, reciteFlash, showReciteAnswer, peekReciteAnswer, markReciteKnown, markReciteUnknown,
      examSelectOption, examSelectJudge, examToggleMultiple, isExamMultipleSelected,
      getPracticeOptionClass, nextQuestion, nextExamQuestion, prevQuestion, exitPractice,
      isExamCorrect,
      examCorrectCount, examScore, examScoreEmoji, toggleFavorite,
      reportQuestion,
      rateBank,
      formatAnswer, formatPracticeAnswer, formatExamAnswer, getTypeName, getTypeClass,
      uploadForm, uploadTagsText, uploading, uploadMsg, uploadMsgClass, uploadPolling, submitUpload, uploadBankType, uploadTab,
      adminTab, adminBanks, adminUsers, adminReports, adminSelfId, loadAdminBanks, loadAdminUsers, loadAdminReports,
      toggleBankStatus, deleteBank, deleteUser, toggleRole, resolveReport, practiceLimit,
      // 新增功能
      examLimit,
      examDuration, examTimeLeft, examTimeDisplay,
      aiExplanation, aiLoading, askAI,
      communityPosts, newPostContent, postComments, showComments, commentInputs,
      formatPostTime, loadCommunityPosts, submitPost, toggleLike, deletePost, toggleComments, loadComments, submitComment,
      leaderboard, loadLeaderboard,
    };
  }
}).mount('#app');
</script>
</body>
</html>
